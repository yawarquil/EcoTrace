        <rect class="cell c4" x="0" y="0" width="56" height="56" rx="11"/><rect class="cell c3" x="0" y="70" width="56" height="56" rx="11"/><rect class="cell c2" x="0" y="140" width="56" height="56" rx="11"/><rect class="cell c4" x="0" y="210" width="56" height="56" rx="11"/><rect class="cell c2" x="0" y="280" width="56" height="56" rx="11"/><rect class="cell c3" x="0" y="350" width="56" height="56" rx="11"/><rect class="cell c4" x="0" y="420" width="56" height="56" rx="11"/>
      </g>
      <g class="w12" transform="translate(770 0)">
        <rect class="cell c2" x="0" y="0" width="56" height="56" rx="11"/><rect class="cell c4" x="0" y="70" width="56" height="56" rx="11"/><rect class="cell c3" x="0" y="140" width="56" height="56" rx="11"/><rect class="cell c4" x="0" y="210" width="56" height="56" rx="11"/><rect class="cell c3" x="0" y="280" width="56" height="56" rx="11"/><rect class="cell c2" x="0" y="350" width="56" height="56" rx="11"/><rect class="cell c4" x="0" y="420" width="56" height="56" rx="11"/>
      </g>
