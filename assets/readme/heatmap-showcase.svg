<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">EcoTrace animated activity heatmap</title>
  <desc id="desc">A wide GitHub-style activity heatmap with animated green intensity blocks for sustainability actions.</desc>
  <style>
    .bg { fill: #081814; }
    .panel { fill: #10231d; stroke: rgba(251,250,245,.14); }
    .title { font: 900 32px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #fbfaf5; }
    .muted { font: 700 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #a7b7af; }
    .month { font: 900 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #c9d7d0; }
    .cell { stroke: rgba(251,250,245,.10); stroke-width: 1; animation: breathe 3.2s ease-in-out infinite; }
    .c0 { fill: #163426; opacity: .72; }
    .c1 { fill: #1f4c31; }
    .c2 { fill: #28683d; }
    .c3 { fill: #348450; }
    .c4 { fill: #47a862; }
    .w2 .cell { animation-delay: .12s; }
    .w3 .cell { animation-delay: .24s; }
    .w4 .cell { animation-delay: .36s; }
    .w5 .cell { animation-delay: .48s; }
    .w6 .cell { animation-delay: .60s; }
    .w7 .cell { animation-delay: .72s; }
    .w8 .cell { animation-delay: .84s; }
    .w9 .cell { animation-delay: .96s; }
    .w10 .cell { animation-delay: 1.08s; }
    .w11 .cell { animation-delay: 1.20s; }
    .w12 .cell { animation-delay: 1.32s; }
    .cursor { animation: scan 5s ease-in-out infinite; }
    .tooltip { animation: tip 5s ease-in-out infinite; }
    @keyframes breathe { 0%,100% { filter: saturate(.9); transform: scale(.96); } 50% { filter: saturate(1.3); transform: scale(1); } }
    @keyframes scan { 0%,12% { transform: translate(0,0); opacity: 0; } 24%,70% { opacity: 1; } 86%,100% { transform: translate(612px,86px); opacity: 0; } }
    @keyframes tip { 0%,22% { opacity: 0; transform: translateY(8px); } 34%,72% { opacity: 1; transform: translateY(0); } 90%,100% { opacity: 0; transform: translateY(8px); } }
  </style>
  <rect class="bg" width="1200" height="360" rx="28"/>
  <rect class="panel" x="30" y="28" width="1140" height="304" rx="24"/>
  <text x="70" y="88" class="title">Activity heatmap</text>
  <text x="70" y="120" class="muted">Twelve weeks of logged eco-positive behavior, tasks, habits, and avoided CO2.</text>
  <text x="980" y="86" class="muted">84 active days</text>
  <text x="70" y="166" class="month">Mar</text>
  <text x="325" y="166" class="month">Apr</text>
  <text x="620" y="166" class="month">May</text>
  <text x="910" y="166" class="month">Jun</text>

  <g transform="translate(70 188)">
    <g class="w1">
      <rect class="cell c1" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c0" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w2" transform="translate(38 0)">
      <rect class="cell c2" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w3" transform="translate(76 0)">
      <rect class="cell c3" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w4" transform="translate(114 0)">
      <rect class="cell c0" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w5" transform="translate(152 0)">
      <rect class="cell c2" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w6" transform="translate(190 0)">
      <rect class="cell c3" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w7" transform="translate(228 0)">
      <rect class="cell c4" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w8" transform="translate(266 0)">
      <rect class="cell c2" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w9" transform="translate(304 0)">
      <rect class="cell c1" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w10" transform="translate(342 0)">
      <rect class="cell c3" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w11" transform="translate(380 0)">
      <rect class="cell c4" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g class="w12" transform="translate(418 0)">
      <rect class="cell c2" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/>
    </g>
    <g transform="translate(520 0)">
      <g class="w1"><rect class="cell c1" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/></g>
      <g class="w2" transform="translate(38 0)"><rect class="cell c4" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="105" width="28" height="28" rx="6"/></g>
      <g class="w3" transform="translate(76 0)"><rect class="cell c3" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c2" x="0" y="105" width="28" height="28" rx="6"/></g>
      <g class="w4" transform="translate(114 0)"><rect class="cell c2" x="0" y="0" width="28" height="28" rx="6"/><rect class="cell c4" x="0" y="35" width="28" height="28" rx="6"/><rect class="cell c3" x="0" y="70" width="28" height="28" rx="6"/><rect class="cell c1" x="0" y="105" width="28" height="28" rx="6"/></g>
    </g>
  </g>

  <g class="cursor" transform="translate(250 244)">
    <rect x="0" y="0" width="30" height="30" rx="7" fill="none" stroke="#d8eeee" stroke-width="3"/>
  </g>
  <g class="tooltip" transform="translate(735 220)">
    <rect width="304" height="64" rx="16" fill="#fbfaf5"/>
    <text x="20" y="28" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="900" fill="#10231d">Sunday, Jun 14</text>
    <text x="20" y="50" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#5b6862">8 actions, 10.5 kg CO2 avoided</text>
  </g>
</svg>
