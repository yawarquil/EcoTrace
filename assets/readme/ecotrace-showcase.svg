    <rect class="heat" x="150" y="52" width="18" height="18" rx="4" fill="#3f9655"/>
    <rect class="heat" x="175" y="52" width="18" height="18" rx="4" fill="#2f7d45"/>
    <rect class="heat" x="200" y="52" width="18" height="18" rx="4" fill="#27633b"/>
