<head>

  <meta name="twitter:card" content="summary">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23081814'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23f3efe5' stroke-width='4'/%3E%3Cpath d='M43 18c-11 .5-19 7-21 15.5-1.4 5.9 1.6 10.2 6.7 10.6 7.7.6 13.8-6.8 15.1-13.8.7-3.8.2-7.8-.8-12.3Z' fill='none' stroke='%23d8eeee' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M23.5 43.5c4-7.2 9.2-12.2 16.5-15.8' fill='none' stroke='%23d8eeee' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&f[]=zodiak@500,600,700&display=swap');

    :root {
      color-scheme: light;
      --font-display: "Zodiak", Georgia, serif;
      --font-ui: "Satoshi", "General Sans", system-ui, sans-serif;

      --text-xs: clamp(0.76rem, 0.72rem + 0.12vw, 0.82rem);
      --text-sm: clamp(0.86rem, 0.82rem + 0.18vw, 0.95rem);
      --text-base: clamp(0.96rem, 0.9rem + 0.24vw, 1.05rem);
      --text-lg: clamp(1.08rem, 1rem + 0.35vw, 1.24rem);
      --text-xl: clamp(1.28rem, 1.12rem + 0.72vw, 1.68rem);
      --text-2xl: clamp(1.9rem, 1.42rem + 2.05vw, 3.15rem);

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
      --space-20: 80px;
      --space-24: 96px;
      --space-32: 128px;

      --forest-950: #081814;
      --forest-900: #10231d;
      --forest-800: #18362d;
      --forest-700: #245144;
      --forest-600: #356b5a;
      --moss-500: #5b8e64;
      --moss-300: #a6c9a1;
      --earth-50: #fbfaf5;
      --earth-100: #f3efe5;
      --earth-200: #e5ddcc;
      --earth-300: #d2c2a7;
      --white: #ffffff;
      --ink: #0d1714;
      --muted-ink: #5b6862;
      --soft-ink: #84918b;
      --accent: #01696f;
      --accent-strong: #014f54;
      --accent-soft: #d8eeee;
      --chart-teal: #0c7b7f;
      --chart-orange: #c76f2d;
      --chart-gold: #b99525;
      --chart-blue: #477a9f;
      --chart-purple: #755d95;
      --success: #2f7d45;
      --success-soft: #dcf1e0;
      --warning: #b77b1d;
      --warning-soft: #f4e7c3;
      --danger: #b85448;
      --danger-soft: #f3d9d5;
      --neutral-soft: #edf0ec;
      --surface: var(--earth-50);
      --surface-elevated: var(--white);
      --surface-subtle: var(--earth-100);
      --surface-pressed: var(--earth-200);
      --surface-inverse: var(--forest-950);
      --scrollbar-track: color-mix(in srgb, var(--surface-pressed) 72%, transparent);
      --scrollbar-thumb: color-mix(in srgb, var(--accent) 74%, var(--forest-700) 26%);
      --scrollbar-thumb-hover: color-mix(in srgb, var(--accent) 84%, var(--forest-900) 16%);
      --text: var(--forest-900);
      --text-muted: var(--muted-ink);
      --text-soft: var(--soft-ink);
      --text-inverse: var(--earth-50);
      --border: rgba(16, 35, 29, 0.13);
      --border-strong: rgba(16, 35, 29, 0.22);
      --shadow-sm: 0 8px 20px rgba(8, 24, 20, 0.07);
      --shadow-md: 0 18px 45px rgba(8, 24, 20, 0.11);
      --shadow-lg: 0 28px 70px rgba(8, 24, 20, 0.16);
      --focus: 0 0 0 3px rgba(1, 105, 111, 0.26);
      --overlay-backdrop: rgba(8, 24, 20, 0.42);
      --inverse-border-soft: rgba(251, 250, 245, 0.14);
      --inverse-stroke-soft: rgba(251, 250, 245, 0.2);
      --inverse-muted-72: rgba(251, 250, 245, 0.72);
      --inverse-muted-76: rgba(251, 250, 245, 0.76);
      --inverse-muted-78: rgba(251, 250, 245, 0.78);
      --accent-shadow: rgba(1, 105, 111, 0.18);
      --accent-shadow-strong: rgba(1, 105, 111, 0.35);
      --success-shadow: rgba(47, 125, 69, 0.24);
      --drop-shadow-strong: rgba(0, 0, 0, 0.34);
      --medal-outline: rgba(8, 24, 20, 0.2);
      --map-glass: rgba(255, 255, 255, 0.03);
      --map-path: rgba(251, 250, 245, 0.12);
      --map-panel: #1b1b18;
      --map-panel-border: #353530;
      --map-dataless: #31312d;
      --map-boundary: #252520;
      --map-low: #d9eeee;
      --map-low-mid: #9fcfd2;
      --map-mid: #4f98a3;
      --map-mid-high: #2a8790;
      --map-high: #01696f;
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius: 8px;
      --radius-pill: 999px;
      --transition-fast: 140ms ease;
      --transition: 240ms ease;
      --transition-slow: 520ms cubic-bezier(0.22, 1, 0.36, 1);

      --surface-dark: #0b1513;
      --surface-elevated-dark: #12231f;
      --surface-subtle-dark: #182d28;
      --surface-pressed-dark: #203932;
      --text-dark: #edf5ee;
      --text-muted-dark: #b5c2bb;
      --text-soft-dark: #829189;
      --border-dark: rgba(237, 245, 238, 0.14);
      --border-strong-dark: rgba(237, 245, 238, 0.24);
      --shadow-dark: 0 22px 60px rgba(0, 0, 0, 0.38);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --surface: var(--surface-dark);
      --surface-elevated: var(--surface-elevated-dark);
      --surface-subtle: var(--surface-subtle-dark);
      --surface-pressed: var(--surface-pressed-dark);
      --surface-inverse: var(--earth-50);
      --text: var(--text-dark);
      --text-muted: var(--text-muted-dark);
      --text-soft: var(--text-soft-dark);
      --text-inverse: var(--forest-950);
      --border: var(--border-dark);
      --border-strong: var(--border-strong-dark);
      --shadow-sm: var(--shadow-dark);
      --shadow-md: var(--shadow-dark);
      --shadow-lg: var(--shadow-dark);
      --accent-soft: rgba(1, 105, 111, 0.28);
      --success-soft: rgba(47, 125, 69, 0.2);
      --warning-soft: rgba(183, 123, 29, 0.22);
      --danger-soft: rgba(184, 84, 72, 0.22);
      --neutral-soft: rgba(237, 245, 238, 0.08);
      --scrollbar-track: color-mix(in srgb, var(--surface-pressed-dark) 62%, var(--forest-950) 38%);
      --scrollbar-thumb: color-mix(in srgb, var(--accent) 72%, var(--text-muted-dark) 28%);
      --scrollbar-thumb-hover: color-mix(in srgb, var(--accent) 88%, var(--earth-50) 12%);
    }

    * {
      box-sizing: border-box;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      scrollbar-width: thin;
    }

    html {
      min-width: 320px;
      scroll-behavior: smooth;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      scrollbar-width: thin;
    }

    *::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    *::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
    }

    *::-webkit-scrollbar-thumb {
      border: 3px solid var(--scrollbar-track);
      border-radius: var(--radius-pill);
      background: var(--scrollbar-thumb);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    *::-webkit-scrollbar-corner {
      background: var(--scrollbar-track);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% -10%, var(--accent-soft), transparent 32rem),
        linear-gradient(180deg, var(--surface), var(--surface-subtle));
      color: var(--text);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    svg {
      max-width: 100%;
    }

    .skip-link {
      position: fixed;
      left: var(--space-4);
      top: var(--space-4);
      z-index: 1000;
      transform: translateY(-150%);
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      background: var(--surface-inverse);
      color: var(--text-inverse);
      text-decoration: none;
      box-shadow: var(--shadow-md);
      transition: transform var(--transition);
    }

    .skip-link:focus {
      transform: translateY(0);
      outline: none;
    }

    :focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-4);
      align-items: center;
      width: 100%;
      margin-inline: auto;
      padding: var(--space-3) clamp(var(--space-4), 3vw, var(--space-8));
      border: 1px solid transparent;
      border-radius: 0;
      color: var(--text);
      transition:
        top var(--transition-slow),
        width var(--transition-slow),
        padding var(--transition-slow),
        border-radius var(--transition-slow),
        background var(--transition),
        border-color var(--transition),
        box-shadow var(--transition),
        backdrop-filter var(--transition),
        transform var(--transition-slow);
    }

    .site-header.is-scrolled {
      top: var(--space-3);
      width: min(1840px, calc(100% - var(--space-6)));
      padding: var(--space-2) var(--space-4);
      border-color: var(--border);
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--surface-elevated) 82%, transparent);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      animation: headerCapsule 460ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .site-header.is-scrolled .brand-kicker {
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);
    }

    .site-header.is-scrolled .nav-link {
      padding: var(--space-2) 10px;
    }

    .site-header.is-scrolled .status-pill,
    .site-header.is-scrolled .icon-button {
      box-shadow: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
      color: var(--forest-900);
      text-decoration: none;
    }

    html[data-theme="dark"] .brand {
      color: var(--text);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
    }

    .brand-text {
      display: grid;
      line-height: 1;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 1.18rem;
      font-weight: 700;
    }

    .brand-kicker {
      margin-top: var(--space-1);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      max-height: 1rem;
      opacity: 1;
      transition: opacity var(--transition), max-height var(--transition), transform var(--transition);
    }

    .nav-tabs,
    .drawer-nav {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .nav-tabs {
      justify-content: flex-start;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .nav-link {
      position: relative;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      border: 0;
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-3);
      background: transparent;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 700;
      text-decoration: none;
      transition: color var(--transition), background var(--transition), transform var(--transition-fast);
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--surface-subtle);
    }

    .nav-link[aria-selected="true"],
    .nav-link.is-active {
      color: var(--text);
      background: var(--surface-elevated);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .nav-link svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: var(--space-2);
      min-width: 0;
    }

    .status-pill,
    .metric-pill,
    .mode-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--surface-elevated);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .status-pill {
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 800;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--surface-elevated);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-fast), background var(--transition), border-color var(--transition);
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      background: var(--surface-subtle);
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      transition: transform var(--transition);
    }

    .menu-toggle[aria-expanded="true"] svg {
      transform: rotate(180deg);
    }

    .menu-toggle {
      display: none;
    }

    .drawer {
      position: fixed;
      top: calc(var(--space-3) + 54px);
      right: clamp(var(--space-3), 3vw, var(--space-8));
      z-index: 120;
      width: min(360px, calc(100vw - var(--space-6)));
      max-height: min(560px, calc(100vh - 96px));
      overflow: auto;
      transform: translateY(-10px) scale(0.98);
      transform-origin: top right;
      opacity: 0;
      pointer-events: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      transition: transform var(--transition-slow), opacity var(--transition), border-color var(--transition);
    }

    .drawer.is-open {
      transform: translateY(0) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-header {
      display: none;
    }

    .drawer-nav {
      align-items: stretch;
      flex-direction: column;
      padding: var(--space-2);
    }

    .drawer-nav .nav-link {
      justify-content: flex-start;
      border-radius: var(--radius);
      padding: var(--space-3);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 110;
      display: none;
      background: transparent;
    }

    .drawer-backdrop.is-open {
      display: block;
    }

    .app-shell {
      width: min(1480px, calc(100% - clamp(var(--space-4), 4vw, var(--space-10)) * 2));
      margin: 0 auto;
      padding: var(--space-8) 0 var(--space-16);
    }

    .page-title {
      margin: 0 0 var(--space-6);
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .view-section {
      display: none;
      content-visibility: auto;
      contain-intrinsic-size: 900px;
    }

    .view-section.is-active {
      display: block;
      animation: fadeUp var(--transition-slow) both;
    }

    .view-grid {
      display: grid;
      gap: var(--space-5);
    }

    .grid-2 {
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-elevated) 94%, transparent);
      box-shadow: var(--shadow-sm);
    }

    .panel.dark-panel {
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--forest-950) 92%, var(--accent) 8%), var(--forest-900));
      color: var(--earth-50);
      border-color: var(--inverse-border-soft);
      box-shadow: var(--shadow-md);
    }

    .panel-header,
    .panel-body,
    .panel-footer {
      padding: var(--space-5);
    }

    .panel-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: var(--space-4);
      border-bottom: 1px solid var(--border);
    }

    .panel-header.no-border {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .panel-title {
      margin: 0;
      font-size: var(--text-lg);
      line-height: 1.18;
      font-weight: 800;
    }

    .panel-kicker {
      margin: var(--space-1) 0 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }

    .dark-panel .panel-kicker,
    .dark-panel .muted {
      color: var(--inverse-muted-72);
    }

    .muted {
      color: var(--text-muted);
    }

    .tiny {
      font-size: var(--text-xs);
    }

    .section-label {
      margin: 0 0 var(--space-3);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .hero-summary {
      display: grid;
      grid-template-columns: minmax(250px, 0.78fr) minmax(0, 1.22fr);
      gap: var(--space-5);
      align-items: stretch;
      overflow: hidden;
      border-color: var(--border-strong);
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--surface-elevated) 90%, var(--accent-soft) 10%), var(--surface-elevated));
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: var(--space-5);
      padding: var(--space-6);
    }

    .hero-copy h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      line-height: 1;
    }

    .hero-copy p {
      max-width: 56ch;
      margin: var(--space-3) 0 0;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .gauge-wrap {
      display: grid;
      place-items: center;
      min-height: 318px;
      padding: var(--space-6);
      background:
        linear-gradient(180deg, var(--surface-subtle), var(--surface-elevated));
      border-left: 1px solid var(--border);
    }

    .carbon-gauge {
      position: relative;
      width: min(270px, 100%);
      aspect-ratio: 1;
    }

    .carbon-gauge svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }

    .gauge-track {
      fill: none;
      stroke: var(--surface-pressed);
      stroke-width: 13;
    }

    .gauge-progress {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 13;
      stroke-dasharray: var(--dash);
      stroke-dashoffset: var(--offset);
      transition: stroke-dashoffset 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .gauge-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      pointer-events: none;
    }

    .gauge-score {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(3rem, 9vw, 5.4rem);
      font-weight: 700;
      line-height: 0.86;
    }

    .gauge-caption {
      margin-top: var(--space-2);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .kpi {
      min-width: 0;
      min-height: 132px;
      container-type: inline-size;
      display: grid;
      grid-template-rows: auto minmax(42px, auto) auto;
      gap: var(--space-2);
      align-content: start;
      overflow: hidden;
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .kpi strong {
      display: block;
      align-self: end;
      max-width: 100%;
      margin-top: 0;
      font-size: clamp(1.65rem, 28cqw, 2.55rem);
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .kpi-label {
      display: block;
      min-height: 2.5em;
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.25;
      text-wrap: balance;
      text-transform: uppercase;
    }

    .kpi-unit {
      display: block;
      max-width: 100%;
      color: var(--text-muted);
      font-size: clamp(0.78rem, 10cqw, 0.95rem);
      font-weight: 600;
      hyphens: none;
      line-height: 1.35;
      overflow-wrap: normal;
      text-wrap: normal;
      word-break: normal;
    }

    .xp-track,
    .progress-track {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 9px;
      border-radius: var(--radius-pill);
      background: var(--surface-pressed);
    }

    .xp-fill,
    .progress-fill {
      height: 100%;
      width: var(--value);
      border-radius: inherit;
      background: var(--accent);
      transition: width var(--transition-slow);
    }

    .progress-fill.success {
      background: var(--success);
    }

    .progress-fill.warning {
      background: var(--warning);
    }

    .progress-fill.danger {
      background: var(--danger);
    }

    .button-row,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }

    .action-button,
    .secondary-button,
    .ghost-button,
    .chip-button,
    .danger-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      min-height: 40px;
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-4);
      font-weight: 800;
      text-decoration: none;
      transition: transform var(--transition-fast), background var(--transition), border-color var(--transition), color var(--transition);
    }

    .action-button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: var(--earth-50);
      box-shadow: 0 10px 24px var(--accent-shadow);
    }

    .action-button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .secondary-button {
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text);
    }

    .secondary-button:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      background: var(--surface-subtle);
    }

    .ghost-button,
    .chip-button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
    }

    .ghost-button:hover,
    .chip-button:hover,
    .chip-button.is-active {
      color: var(--text);
      background: var(--surface-subtle);
      border-color: var(--border-strong);
    }

    .danger-button {
      border: 1px solid var(--danger);
      background: var(--danger-soft);
      color: var(--danger);
    }

    .action-button svg,
    .secondary-button svg,
    .ghost-button svg,
    .chip-button svg,
    .danger-button svg,
    .task-status svg {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
    }

    .focus-card .action-button {
      align-self: start;
      max-width: min(100%, 275px);
      min-height: 44px;
      padding: var(--space-3) var(--space-4);
      line-height: 1.15;
      text-align: left;
      white-space: normal;
    }

    .button-icon {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
    }

    .chart-card {
      min-height: 100%;
    }

    .bar-chart {
      width: 100%;
      height: 235px;
    }

    .bar {
      transform-origin: bottom;
      animation: riseBar 820ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .line-chart {
      width: 100%;
      height: 310px;
    }

    .line-path {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: drawLine 1300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .chart-grid-line {
      stroke: var(--border);
      stroke-width: 1;
    }

    .chart-label {
      fill: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-ui);
      font-weight: 700;
    }

    .chart-dot {
      transition: r var(--transition-fast), filter var(--transition-fast);
    }

    .chart-dot:hover,
    .chart-dot:focus {
      r: 7;
      filter: drop-shadow(0 4px 10px var(--accent-shadow-strong));
    }

    .heatmap-panel {
      overflow: hidden;
    }

    .heatmap-scroller {
      container-type: inline-size;
      overflow: clip;
      margin: calc(-1 * var(--space-4));
      padding: var(--space-4) var(--space-4) var(--space-8);
    }

    .heatmap-frame {
      --heat-gap: clamp(5px, 0.65cqw, 12px);
      width: 100%;
      min-width: 0;
    }

    .heatmap {
      display: grid;
      grid-auto-flow: column;
      grid-template-columns: repeat(var(--heat-columns), minmax(0, 1fr));
      grid-template-rows: repeat(7, auto);
      gap: var(--heat-gap);
      width: 100%;
      padding: var(--space-3) 0 var(--space-4);
    }

    .heat-cell {
      width: 100%;
      height: auto;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      border-radius: clamp(4px, 0.42cqw, 9px);
      background: var(--surface-pressed);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition);
    }

    .heat-cell:hover,
    .heat-cell:focus-visible {
      transform: scale(1.35);
      box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm);
      z-index: 2;
    }

    .heat-0 { background: var(--surface-pressed); }
    .heat-1 { background: color-mix(in srgb, var(--success) 26%, var(--surface-elevated)); }
    .heat-2 { background: color-mix(in srgb, var(--success) 44%, var(--surface-elevated)); }
    .heat-3 { background: color-mix(in srgb, var(--success) 64%, var(--surface-elevated)); }
    .heat-4 { background: var(--success); }

    .ai-insights-panel {
      overflow: hidden;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--surface-elevated) 86%, var(--accent-soft) 14%), var(--surface-elevated));
    }

    .ai-insight-status {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: flex-end;
      align-items: center;
    }

    .ai-insight-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .ai-insight-card {
      min-width: 0;
      display: grid;
      gap: var(--space-3);
      align-content: start;
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .ai-insight-card h3 {
      margin: 0;
      font-size: var(--text-lg);
      line-height: 1.12;
    }

    .ai-insight-card p {
      margin: 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }

    .ai-insight-action {
      display: grid;
      gap: var(--space-1);
      margin-top: var(--space-1);
      padding-top: var(--space-3);
      border-top: 1px solid var(--border);
    }

    .ai-insight-action strong {
      font-size: var(--text-sm);
      line-height: 1.25;
    }

    .ai-insight-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }

    .ai-insight-note {
      margin-top: var(--space-4);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 800;
      line-height: 1.45;
    }

    .ai-chat {
      display: grid;
      gap: var(--space-4);
      margin-top: var(--space-5);
      padding: var(--space-5);
      border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 12% 8%, color-mix(in srgb, var(--accent-soft) 62%, transparent) 0 140px, transparent 260px),
        linear-gradient(145deg, color-mix(in srgb, var(--surface-elevated) 92%, var(--accent-soft) 8%), var(--surface-elevated));
      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--white) 46%, transparent);
    }

    .ai-chat-header {
      display: flex;
      gap: var(--space-4);
      justify-content: space-between;
      align-items: start;
    }

    .ai-chat-header h3 {
      margin: 0;
      font-size: var(--text-lg);
      line-height: 1.15;
    }

    .ai-chat-header p {
      margin: var(--space-1) 0 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }

    .ai-chat-status {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--surface-elevated) 72%, transparent);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 900;
      white-space: nowrap;
    }

    .ai-chat-status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .ai-chat-log {
      display: grid;
      gap: var(--space-2);
      max-height: 310px;
      overflow: auto;
      padding: var(--space-1) var(--space-1) var(--space-1) 0;
    }

    .ai-chat-message {
      max-width: min(78%, 760px);
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius) 2px;
      background: var(--surface-elevated);
      box-shadow: var(--shadow-sm);
    }

    .ai-chat-message.is-user {
      justify-self: end;
      background: var(--accent);
      color: var(--earth-50);
      border-color: var(--accent);
      border-radius: var(--radius) var(--radius) 2px var(--radius);
    }

    .ai-chat-message span {
      display: block;
      margin-bottom: var(--space-1);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 900;
      text-transform: uppercase;
    }

    .ai-chat-message.is-user span {
      color: var(--inverse-muted-78);
    }

    .ai-chat-message p {
      margin: 0;
      line-height: 1.45;
    }

    .ai-chat-prompts {
      position: relative;
      display: flex;
      overflow: hidden;
      padding-block: var(--space-1);
      mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
    }

    .ai-chat-prompt-track {
      display: flex;
      width: max-content;
      gap: var(--space-2);
      animation: promptRail 34s linear infinite;
    }

    .ai-chat-prompts:hover .ai-chat-prompt-track,
    .ai-chat-prompts:focus-within .ai-chat-prompt-track {
      animation-play-state: paused;
    }

    .ai-chat-prompt-track .chip-button {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .ai-chat-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      padding: var(--space-2);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 6px);
      background: var(--surface-elevated);
      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--white) 58%, transparent), var(--shadow-sm);
    }

    .ai-chat-form textarea {
      min-height: 48px;
      max-height: 132px;
      padding: var(--space-2) var(--space-3);
      resize: none;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      box-shadow: none;
      line-height: 1.4;
    }

    .ai-chat-form textarea:focus {
      outline: 0;
      box-shadow: none;
    }

    .ai-chat-form:focus-within {
      border-color: color-mix(in srgb, var(--accent) 52%, var(--border));
      box-shadow: var(--focus), var(--shadow-sm);
    }

    .ai-chat-form .action-button {
      min-height: 48px;
      padding-inline: var(--space-4);
    }

    .ai-insights-panel.is-loading .ai-insight-card {
      position: relative;
      overflow: hidden;
    }

    .ai-insights-panel.is-loading .ai-insight-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent-soft) 42%, transparent), transparent);
      transform: translateX(-100%);
      animation: shimmer 1500ms linear infinite;
      pointer-events: none;
    }

    .heat-months {
      display: grid;
      grid-template-columns: repeat(var(--heat-columns), minmax(0, 1fr));
      gap: var(--heat-gap);
      width: 100%;
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 800;
    }

    .heat-months span {
      min-width: max-content;
      white-space: nowrap;
    }

    .legend {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 700;
    }

    .legend-swatch,
    .category-swatch {
      width: 11px;
      height: 11px;
      border-radius: var(--radius-xs);
      background: var(--swatch);
      flex: 0 0 auto;
    }

    .category-bars {
      display: grid;
      gap: var(--space-4);
    }

    .category-row {
      display: grid;
      grid-template-columns: minmax(126px, 0.45fr) minmax(130px, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
    }

    .category-name {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-weight: 800;
    }

    .category-track {
      overflow: hidden;
      height: 10px;
      border-radius: var(--radius-pill);
      background: var(--surface-pressed);
    }

    .category-fill {
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: var(--swatch);
      transition: width var(--transition-slow);
    }

    .source-meta {
      text-align: right;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 800;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .quick-action {
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-3);
      background: var(--surface-elevated);
      color: var(--text);
      font-size: var(--text-sm);
      font-weight: 800;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-fast), border-color var(--transition), background var(--transition);
    }

    .quick-action:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .focus-card {
      display: grid;
      gap: var(--space-3);
      align-content: start;
      min-height: 100%;
      background:
        linear-gradient(140deg, var(--forest-900), var(--accent-strong));
      color: var(--earth-50);
    }

    .focus-card .panel-kicker {
      color: var(--inverse-muted-78);
    }

    .task-list,
    .goal-list,
    .habit-list,
    .challenge-list,
    .badge-grid,
    .achievement-grid,
    .tip-grid,
    .module-grid {
      display: grid;
      gap: var(--space-3);
    }

    .task-card,
    .goal-card,
    .habit-card,
    .challenge-card,
    .tip-card,
    .module-card,
    .recommendation-card,
    .achievement-card,
    .badge-card,
    .leader-row,
    .comparison-card,
    .timeline-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .task-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-3);
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
    }

    .task-card.is-completed {
      border-color: color-mix(in srgb, var(--success) 40%, var(--border));
      background: var(--success-soft);
      animation: taskComplete 520ms ease both;
    }

    .task-status {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill);
      color: var(--text-muted);
      background: var(--surface);
      font-weight: 900;
    }

    .task-card.is-completed .task-status {
      border-color: var(--success);
      background: var(--success);
      color: var(--earth-50);
    }

    .task-card h3,
    .goal-card h3,
    .habit-card h3,
    .challenge-card h3,
    .tip-card h3,
    .module-card h3,
    .recommendation-card h3,
    .achievement-card h3,
    .timeline-item h3 {
      margin: 0;
      font-size: var(--text-base);
      line-height: 1.25;
    }

    .task-card p,
    .goal-card p,
    .habit-card p,
    .challenge-card p,
    .tip-card p,
    .module-card p,
    .recommendation-card p,
    .achievement-card p,
    .timeline-item p {
      margin: var(--space-1) 0 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
      line-height: 1.45;
    }

    .status-tag,
    .level-tag,
    .reward-tag,
    .tone-tag {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      border-radius: var(--radius-pill);
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-xs);
      font-weight: 900;
      white-space: nowrap;
    }

    .status-tag {
      background: var(--neutral-soft);
      color: var(--text-muted);
    }

    .level-tag {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .reward-tag {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .tone-low {
      background: var(--success-soft);
      color: var(--success);
    }

    .tone-moderate {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .tone-high {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .log-workspace {
      display: grid;
      grid-template-columns: minmax(0, 0.85fr) minmax(320px, 1.15fr);
      gap: var(--space-5);
    }

    .stepper {
      display: grid;
      gap: var(--space-3);
    }

    .step-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .step-number {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-pill);
      background: var(--surface-pressed);
      color: var(--text-muted);
      font-weight: 900;
    }

    .step-item.is-active .step-number,
    .step-item.is-complete .step-number {
      background: var(--accent);
      color: var(--earth-50);
    }

    .category-picker {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .category-button {
      min-height: 122px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4);
      background: var(--surface-elevated);
      text-align: left;
      transition: transform var(--transition-fast), border-color var(--transition), background var(--transition);
    }

    .category-button:hover,
    .category-button.is-selected {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .category-button strong {
      display: block;
      margin-top: var(--space-4);
      font-size: var(--text-base);
    }

    .category-button > svg {
      width: 24px;
      height: 24px;
    }

    .category-button span {
      display: block;
      margin-top: var(--space-1);
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
    }

    .field {
      display: grid;
      gap: var(--space-2);
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 900;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3);
      background: var(--surface-elevated);
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .field textarea {
      resize: vertical;
      min-height: 92px;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: var(--focus);
      outline: none;
    }

    .suggestion-panel {
      display: grid;
      gap: var(--space-2);
      margin-top: var(--space-4);
      padding: var(--space-4);
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--text);
    }

    .review-card {
      display: grid;
      gap: var(--space-4);
    }

    .review-impact {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5);
      border-radius: var(--radius);
      background: var(--surface-subtle);
    }

    .review-impact strong {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.9;
    }

    .celebration-card {
      display: grid;
      place-items: center;
      min-height: 430px;
      text-align: center;
      animation: fadeUp var(--transition-slow) both;
    }

    .celebration-mark {
      display: grid;
      place-items: center;
      width: 86px;
      height: 86px;
      margin-inline: auto;
      border-radius: var(--radius-pill);
      background: var(--success);
      color: var(--earth-50);
      box-shadow: 0 16px 38px var(--success-shadow);
      animation: levelPulse 900ms ease both;
    }

    .celebration-mark svg {
      display: block;
      width: 42px;
      height: 42px;
      transform: translateY(0);
    }

    .donut-wrap {
      display: grid;
      grid-template-columns: minmax(220px, 0.74fr) minmax(0, 1fr);
      gap: var(--space-5);
      align-items: center;
    }

    .donut-chart {
      width: min(290px, 100%);
      aspect-ratio: 1;
      margin: 0 auto;
      transform: rotate(-90deg);
    }

    .donut-segment {
      fill: none;
      stroke-width: 18;
      cursor: pointer;
      transition: stroke-width var(--transition-fast), opacity var(--transition-fast);
    }

    .donut-segment:hover,
    .donut-segment:focus {
      stroke-width: 22;
      opacity: 0.88;
      outline: none;
    }

    .donut-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      pointer-events: none;
    }

    .donut-box {
      position: relative;
    }

    .legend-list {
      display: grid;
      gap: var(--space-3);
    }

    .legend-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      font-size: var(--text-sm);
      font-weight: 800;
    }

    .recommendation-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .recommendation-card {
      padding: var(--space-4);
    }

    .pattern-list {
      display: grid;
      gap: var(--space-3);
    }

    .pattern-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--space-3);
      align-items: start;
      padding: var(--space-3);
      border-radius: var(--radius);
      background: var(--surface-subtle);
    }

    .world-map {
      width: 100%;
      min-height: 360px;
      border-radius: var(--radius);
      background: var(--map-panel);
    }

    .map-country,
    .map-no-data {
      cursor: pointer;
      stroke: var(--map-boundary);
      stroke-width: 1.6;
      vector-effect: non-scaling-stroke;
      transition: opacity var(--transition-fast), transform var(--transition-fast), filter var(--transition-fast), stroke var(--transition-fast);
      transform-box: fill-box;
      transform-origin: center;
    }

    .map-no-data {
      fill: var(--map-dataless);
      cursor: default;
      opacity: 0.92;
    }

    .map-country {
      opacity: 0.96;
    }

    .map-country:hover,
    .map-country:focus {
      opacity: 1;
      transform: translateY(-1px);
      filter: drop-shadow(0 10px 16px var(--drop-shadow-strong));
      stroke: var(--earth-50);
      outline: none;
    }

    .map-tone-0 { fill: var(--map-low); }
    .map-tone-1 { fill: var(--map-low-mid); }
    .map-tone-2 { fill: var(--map-mid); }
    .map-tone-3 { fill: var(--map-mid-high); }
    .map-tone-4 { fill: var(--map-high); }

    .map-frame {
      fill: var(--map-panel);
      stroke: var(--map-panel-border);
      stroke-width: 1.5;
    }

    .map-grain {
      fill: none;
      stroke: var(--map-path);
      stroke-width: 1;
    }

    .map-legend {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: var(--space-2);
      color: var(--inverse-muted-76);
      font-size: var(--text-xs);
      font-weight: 800;
    }

    .legend-ramp {
      flex: 1;
      height: 10px;
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, var(--map-low), var(--map-low-mid), var(--map-mid), var(--map-mid-high), var(--map-high));
    }

    .country-map-card {
      overflow: hidden;
      padding: var(--space-7);
      border-color: var(--map-panel-border);
      border-radius: var(--radius);
      background: var(--map-panel);
      color: var(--text-dark);
      box-shadow: none;
    }

    .country-map-card h2 {
      margin: 0;
      color: var(--text-muted-dark);
      font-family: var(--font-ui);
      font-size: var(--text-xl);
      line-height: 1.1;
      font-weight: 900;
    }

    .geo-map {
      min-height: 520px;
      margin-top: var(--space-7);
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--map-panel);
    }

    .geo-map svg {
      width: 100%;
      height: 100%;
    }

    .geo-fallback {
      display: grid;
      place-items: center;
      min-height: 520px;
      color: var(--text-muted-dark);
      text-align: center;
    }

    .goal-card,
    .habit-card,
    .challenge-card,
    .tip-card,
    .module-card,
    .achievement-card,
    .timeline-item {
      padding: var(--space-4);
    }

    .goal-meta,
    .habit-meta,
    .challenge-meta,
    .profile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      margin-top: var(--space-3);
    }

    .habit-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3);
      background: var(--surface-subtle);
      font-weight: 900;
      text-align: left;
    }

    .toggle-knob {
      position: relative;
      width: 48px;
      height: 27px;
      border-radius: var(--radius-pill);
      background: var(--surface-pressed);
      transition: background var(--transition);
      flex: 0 0 auto;
    }

    .toggle-knob::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 19px;
      height: 19px;
      border-radius: var(--radius-pill);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition);
    }

    .habit-toggle[aria-pressed="true"] .toggle-knob {
      background: var(--success);
    }

    .habit-toggle[aria-pressed="true"] .toggle-knob::after {
      transform: translateX(21px);
    }

    .challenge-ring {
      --ring-size: 72px;
      position: relative;
      width: var(--ring-size);
      height: var(--ring-size);
      flex: 0 0 auto;
    }

    .challenge-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .challenge-ring .ring-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: var(--text-xs);
      font-weight: 900;
    }

    .challenge-layout {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    .leaderboard-controls,
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: space-between;
    }

    .segmented {
      display: inline-flex;
      gap: var(--space-1);
      padding: var(--space-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--surface-subtle);
    }

    .segmented button {
      border: 0;
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-3);
      background: transparent;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 900;
    }

    .segmented button.is-active {
      background: var(--surface-elevated);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .leader-list {
      display: grid;
      gap: var(--space-2);
    }

    .leader-row {
      display: grid;
      grid-template-columns: 48px 42px minmax(0, 1fr) auto auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-3);
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
    }

    .leader-row.is-current {
      border-color: var(--accent);
      background: var(--accent-soft);
      animation: rowGlow 1200ms ease both;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-pill);
      background: var(--surface-inverse);
      color: var(--text-inverse);
      font-size: var(--text-xs);
      font-weight: 900;
    }

    .rank {
      color: var(--text-muted);
      font-weight: 900;
      text-align: center;
    }

    .rank-change.up {
      color: var(--success);
    }

    .rank-change.down {
      color: var(--danger);
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .comparison-card {
      padding: var(--space-4);
    }

    .comparison-card strong {
      display: block;
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 1;
    }

    .learn-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(340px, 1.08fr);
      gap: var(--space-5);
    }

    .module-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .module-card {
      min-height: 160px;
    }

    .mini-diagram {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-1);
      align-items: end;
      height: 48px;
      margin-top: var(--space-4);
    }

    .mini-diagram span {
      display: block;
      border-radius: var(--radius-xs);
      background: var(--swatch);
      height: var(--height);
    }

    .quiz-card {
      display: grid;
      gap: var(--space-4);
    }

    .quiz-option {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-3);
      background: var(--surface-elevated);
      text-align: left;
      font-weight: 800;
      transition: border-color var(--transition), background var(--transition), transform var(--transition-fast);
    }

    .quiz-option:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .quiz-option.is-correct {
      border-color: var(--success);
      background: var(--success-soft);
    }

    .quiz-option.is-wrong {
      border-color: var(--danger);
      background: var(--danger-soft);
    }

    .quiz-feedback {
      padding: var(--space-4);
      border-radius: var(--radius);
      background: var(--surface-subtle);
      animation: fadeUp var(--transition) both;
    }

    .featured-rail {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .tip-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .tip-card.is-done {
      border-color: color-mix(in srgb, var(--success) 45%, var(--border));
      background: var(--success-soft);
    }

    .effort-matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .matrix-quadrant {
      min-height: 118px;
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .profile-header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-5);
      align-items: center;
      padding: var(--space-6);
    }

    .profile-avatar {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      border-radius: var(--radius-pill);
      background: var(--surface-inverse);
      color: var(--text-inverse);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
    }

    .profile-header h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      line-height: 1;
    }

    .badge-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .badge-card {
      display: grid;
      gap: var(--space-2);
      min-height: 132px;
      padding: var(--space-3);
      text-align: center;
      transition: transform var(--transition), opacity var(--transition), filter var(--transition);
    }

    .badge-card.is-locked {
      opacity: 0.52;
      filter: grayscale(0.85);
    }

    .badge-card.is-unlocked {
      animation: badgeShimmer 1400ms ease both;
    }

    .badge-medal {
      display: grid;
      place-items: center;
      width: 45px;
      height: 45px;
      margin: 0 auto;
      border-radius: var(--radius-pill);
      background:
        radial-gradient(circle at 35% 25%, var(--earth-50), var(--chart-gold) 46%, var(--warning));
      color: var(--forest-900);
      font-weight: 900;
      box-shadow: inset 0 0 0 1px var(--medal-outline), var(--shadow-sm);
    }

    .achievement-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .timeline {
      position: relative;
      display: grid;
      gap: var(--space-3);
    }

    .timeline-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--space-3);
      align-items: start;
    }

    .timeline-dot {
      width: 14px;
      height: 14px;
      margin-top: var(--space-1);
      border-radius: var(--radius-pill);
      background: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    .tooltip {
      position: fixed;
      z-index: 1000;
      max-width: min(320px, calc(100vw - 32px));
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-inverse);
      color: var(--text-inverse);
      font-size: var(--text-sm);
      box-shadow: var(--shadow-md);
      pointer-events: none;
    }

    .confetti {
      position: fixed;
      inset: 0;
      z-index: 1000;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .skeleton-shell {
      display: grid;
      gap: var(--space-4);
    }

    .skeleton-line,
    .skeleton-block {
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--surface-pressed);
      position: relative;
    }

    .skeleton-line {
      width: min(480px, 100%);
      height: 28px;
    }

    .skeleton-block {
      min-height: 320px;
    }

    .skeleton-line::after,
    .skeleton-block::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--surface-elevated) 70%, transparent), transparent);
      animation: shimmer 1300ms infinite;
    }

    .empty-state {
      display: grid;
      gap: var(--space-3);
      padding: var(--space-6);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface-subtle);
      text-align: center;
    }

    .inline-stat {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 800;
    }

    .onboarding-backdrop {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: grid;
      place-items: center;
      padding: var(--space-4);
      background: color-mix(in srgb, var(--forest-950) 48%, transparent);
      backdrop-filter: blur(10px);
    }

    .onboarding-panel {
      width: min(860px, 100%);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      animation: fadeUp var(--transition-slow) both;
    }

    .onboarding-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.82fr) minmax(300px, 1.18fr);
      gap: 0;
    }

    .onboarding-aside {
      display: grid;
      align-content: space-between;
      min-height: 460px;
      padding: var(--space-6);
      background: linear-gradient(150deg, var(--forest-900), var(--accent-strong));
      color: var(--earth-50);
    }

    .onboarding-aside p {
      color: var(--inverse-muted-78);
    }

    .onboarding-body {
      padding: var(--space-6);
    }

    .onboarding-body.is-step-enter {
      animation: onboardingStepIn var(--transition) both;
    }

    .onboarding-backdrop.is-closing {
      pointer-events: none;
      animation: fadeOut var(--transition) both;
    }

    .onboarding-backdrop.is-closing .onboarding-panel {
      animation: onboardingClose var(--transition) both;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .option-card {
      display: grid;
      gap: var(--space-2);
      min-height: 104px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4);
      background: var(--surface-elevated);
      text-align: left;
      transition: transform var(--transition-fast), border-color var(--transition), background var(--transition);
    }

    .option-card:hover,
    .option-card[aria-pressed="true"] {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .simulator-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 0.65fr);
      gap: var(--space-5);
      align-items: stretch;
    }

    .slider-stack {
      display: grid;
      gap: var(--space-4);
    }

    .range-row {
      display: grid;
      gap: var(--space-2);
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-subtle);
    }

    .range-row label {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .range-row input[type="range"] {
      accent-color: var(--accent);
    }

    .forecast-card {
      display: grid;
      gap: var(--space-3);
      align-content: center;
      padding: var(--space-5);
      border-radius: var(--radius);
      background: var(--forest-900);
      color: var(--earth-50);
    }

    .forecast-card strong {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      line-height: 0.95;
    }

    .forecast-card p {
      color: var(--inverse-muted-78);
    }

    .coach-shell,
    .story-shell,
    .report-card {
      display: grid;
      gap: var(--space-4);
    }

    .coach-message {
      padding: var(--space-4);
      border-radius: var(--radius);
      background: var(--surface-subtle);
    }

    .coach-message strong {
      display: block;
      margin-bottom: var(--space-2);
    }

    .story-meter {
      display: grid;
      gap: var(--space-2);
    }

    .story-bars {
      display: grid;
      gap: var(--space-2);
    }

    .story-bar {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 900;
    }

    .budget-panel {
      display: grid;
      gap: var(--space-4);
      align-self: start;
      align-content: start;
    }

    .budget-stack {
      display: grid;
      gap: var(--space-5);
      align-content: start;
    }

    .budget-meter {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-4);
      align-items: end;
    }

    .budget-meter strong,
    .scenario-stat strong {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      line-height: 0.95;
    }

    .budget-controls {
      display: grid;
      grid-template-columns: minmax(120px, 0.7fr) minmax(0, 1fr);
      gap: var(--space-3);
      align-items: end;
    }

    .budget-insights {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: var(--space-2);
      margin-top: var(--space-4);
    }

    .budget-insight {
      min-width: 0;
      display: grid;
      gap: var(--space-1);
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .budget-insight span,
    .budget-nudge strong {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 900;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .budget-insight strong {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 0.95;
    }

    .budget-insight small {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 800;
      line-height: 1.25;
    }

    .budget-nudge {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--space-3);
      align-items: start;
      margin-top: var(--space-3);
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--accent-soft);
    }

    .budget-nudge strong {
      color: var(--accent);
      white-space: nowrap;
    }

    .budget-nudge span {
      color: var(--text);
      font-size: var(--text-sm);
      font-weight: 800;
      line-height: 1.45;
    }

    .budget-runway {
      overflow: hidden;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--surface-elevated) 88%, var(--accent-soft) 12%), var(--surface-elevated));
    }

    .budget-runway .panel-body {
      display: grid;
      gap: var(--space-4);
    }

    .runway-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
    }

    .runway-metric {
      display: grid;
      gap: var(--space-1);
      min-width: 0;
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .runway-metric span,
    .runway-action span {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 900;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .runway-tone {
      display: inline-flex;
      width: max-content;
      border-radius: var(--radius-pill);
      padding: var(--space-1) var(--space-2);
    }

    .runway-metric strong {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 0.95;
    }

    .runway-metric small {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 800;
      line-height: 1.25;
    }

    .runway-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: var(--space-2);
    }

    .runway-day {
      min-width: 0;
      min-height: 58px;
      display: grid;
      align-content: center;
      gap: var(--space-1);
      padding: var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-subtle);
      text-align: center;
    }

    .runway-day strong {
      overflow: hidden;
      color: var(--text);
      font-size: var(--text-xs);
      font-weight: 900;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .runway-day small {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 800;
      line-height: 1.1;
    }

    .runway-day.is-done {
      border-color: var(--success);
      background: var(--success-soft);
    }

    .runway-day.is-next {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent-shadow);
    }

    .runway-action {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface-elevated) 72%, var(--accent-soft) 28%);
    }

    .runway-action h3 {
      margin: var(--space-1) 0 0;
      font-size: var(--text-lg);
      line-height: 1.1;
    }

    .runway-action p {
      margin: var(--space-1) 0 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
      line-height: 1.35;
    }

    .weekly-plan {
      display: grid;
      gap: var(--space-3);
    }

    .plan-day {
      display: grid;
      grid-template-columns: minmax(86px, 0.28fr) minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
    }

    .plan-day.is-done {
      border-color: var(--success);
      background: var(--success-soft);
    }

    .plan-date {
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 900;
      text-transform: uppercase;
    }

    .plan-day h3,
    .reflection-card h3,
    .timeline-story h3 {
      margin: 0;
      font-size: var(--text-base);
    }

    .scenario-drawer {
      position: fixed;
      inset: 0;
      z-index: 156;
      display: grid;
      justify-items: end;
      background: color-mix(in srgb, var(--forest-950) 34%, transparent);
      backdrop-filter: blur(8px);
    }

    .scenario-panel {
      width: min(760px, 100%);
      height: 100%;
      overflow: auto;
      padding: var(--space-6);
      border-left: 1px solid var(--border);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      animation: scenarioIn var(--transition-slow) both;
    }

    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .scenario-stat {
      display: grid;
      gap: var(--space-2);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-subtle);
    }

    .scenario-list {
      display: grid;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }

    .scenario-list li {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
      list-style: none;
      font-weight: 800;
    }

    .reflection-card {
      display: grid;
      gap: var(--space-4);
    }

    .mood-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .mood-chip {
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-3);
      background: var(--surface-elevated);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: 900;
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition-fast);
    }

    .mood-chip[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .reflection-form {
      display: grid;
      gap: var(--space-3);
    }

    .achievement-storyline {
      display: grid;
      gap: var(--space-3);
    }

    .timeline-story {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: start;
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
      animation: fadeUp var(--transition-slow) both;
      animation-delay: calc(var(--i, 0) * 55ms);
    }

    .timeline-medal {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: var(--radius-pill);
      background: var(--warning-soft);
      color: var(--warning);
      font-weight: 900;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: 110px repeat(7, minmax(72px, 1fr));
      gap: var(--space-2);
      overflow-x: auto;
      padding-bottom: var(--space-1);
    }

    .planner-cell,
    .planner-head {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-elevated);
      padding: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 900;
      text-align: center;
    }

    .planner-head {
      display: grid;
      place-items: center;
      background: var(--surface-subtle);
      color: var(--text-muted);
    }

    .planner-cell {
      color: var(--text-muted);
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition-fast);
    }

    .planner-cell[aria-pressed="true"] {
      border-color: var(--success);
      background: var(--success-soft);
      color: var(--success);
    }

    .reward-toast {
      position: fixed;
      right: var(--space-5);
      bottom: var(--space-5);
      z-index: 160;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
      width: min(420px, calc(100vw - var(--space-8)));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      animation: fadeUp var(--transition-slow) both;
    }

    .reward-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-pill);
      background: var(--warning-soft);
      color: var(--warning);
      font-weight: 900;
    }

    .report-overlay {
      position: fixed;
      inset: 0;
      z-index: 155;
      display: grid;
      place-items: center;
      padding: var(--space-4);
      background: color-mix(in srgb, var(--forest-950) 40%, transparent);
      backdrop-filter: blur(8px);
    }

    .report-card {
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - var(--space-8)));
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-6);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .report-section {
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-subtle);
    }

    .geo-fallback-card {
      display: grid;
      gap: var(--space-4);
      place-items: center;
      min-height: 520px;
      padding: var(--space-6);
      color: var(--text-muted-dark);
      text-align: center;
    }

    .fallback-map-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-2);
      width: min(520px, 100%);
    }

    .fallback-chip {
      min-height: 42px;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--map-high) var(--tone), var(--map-dataless));
    }

    .mt-2 { margin-top: var(--space-2); }
    .mt-3 { margin-top: var(--space-3); }
    .mt-4 { margin-top: var(--space-4); }
    .mt-5 { margin-top: var(--space-5); }
    .mb-0 { margin-bottom: 0; }
    .text-right { text-align: right; }
    .span-2 { grid-column: span 2; }
    .span-full { grid-column: 1 / -1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    @keyframes onboardingStepIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes onboardingClose {
      to { opacity: 0; transform: translateY(10px) scale(0.985); }
    }

    @keyframes riseBar {
      from { transform: scaleY(0); opacity: 0.45; }
      to { transform: scaleY(1); opacity: 1; }
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    @keyframes taskComplete {
      0% { transform: scale(1); }
      45% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }

    @keyframes levelPulse {
      0% { transform: scale(0.88); }
      55% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes badgeShimmer {
      0% { box-shadow: var(--shadow-sm); }
      42% { box-shadow: 0 0 0 4px var(--warning-soft), var(--shadow-md); }
      100% { box-shadow: var(--shadow-sm); }
    }

    @keyframes rowGlow {
      0% { box-shadow: 0 0 0 0 var(--accent-soft); }
      55% { box-shadow: 0 0 0 6px var(--accent-soft); }
      100% { box-shadow: var(--shadow-sm); }
    }

    @keyframes scenarioIn {
      from { opacity: 0; transform: translateX(18px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    @keyframes promptRail {
      to { transform: translateX(-50%); }
    }

    @keyframes headerCapsule {
      0% { transform: translateY(-6px) scale(0.985); }
      58% { transform: translateY(1px) scale(1.006); }
      100% { transform: translateY(0) scale(1); }
    }

    @media (max-width: 1500px) {
      .header-actions .status-pill:nth-of-type(2),
      .header-actions .status-pill:nth-of-type(3) {
        display: none;
      }
    }

    @media (max-width: 1360px) {
      .nav-tabs {
        display: none;
      }

      .menu-toggle {
        display: inline-grid;
      }
    }

    @media (max-width: 1180px) {
      .nav-tabs {
        display: none;
      }

      .menu-toggle {
        display: inline-grid;
      }

      .site-header {
        grid-template-columns: auto 1fr auto;
      }

      .header-actions .status-pill:nth-of-type(2),
      .header-actions .status-pill:nth-of-type(3) {
        display: none;
      }

      .grid-4,
      .kpi-grid,
      .featured-rail,
      .tip-grid,
      .recommendation-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .category-picker {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        width: min(100% - var(--space-4) * 2, 1480px);
        padding-top: var(--space-5);
      }

      .site-header {
        gap: var(--space-2);
      }

      .brand-kicker,
      .header-actions .status-pill {
        display: none;
      }

      .hero-summary,
      .grid-2,
      .grid-3,
      .log-workspace,
      .donut-wrap,
      .learn-layout,
      .profile-header {
        grid-template-columns: 1fr;
      }

      .gauge-wrap {
        border-left: 0;
        border-top: 1px solid var(--border);
      }

      .kpi-grid,
      .grid-4,
      .ai-insight-grid,
      .comparison-grid,
      .module-grid,
      .tip-grid,
      .featured-rail,
      .recommendation-grid,
      .achievement-grid,
      .badge-grid,
      .category-picker,
      .form-grid,
      .effort-matrix {
        grid-template-columns: 1fr;
      }

      .category-row {
        grid-template-columns: 1fr;
      }

      .source-meta {
        text-align: left;
      }

      .leader-row {
        grid-template-columns: 34px 38px minmax(0, 1fr);
      }

      .leader-row > .rank-change,
      .leader-row > .leader-score {
        grid-column: 3;
      }

      .review-impact {
        display: grid;
      }

      .onboarding-grid,
      .simulator-layout,
      .budget-controls,
      .runway-summary,
      .runway-action,
      .ai-chat-form,
      .plan-day,
      .report-grid {
        grid-template-columns: 1fr;
      }

      .ai-chat-header {
        display: grid;
      }

      .ai-chat-message {
        max-width: 100%;
      }

      .scenario-grid {
        grid-template-columns: 1fr;
      }

      .onboarding-aside {
        min-height: auto;
      }

      .option-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .panel-header,
      .panel-body,
      .panel-footer,
      .hero-copy,
      .gauge-wrap,
      .profile-header {
        padding: var(--space-4);
      }

      .brand-name {
        font-size: 1rem;
      }

      .page-title {
        margin-bottom: var(--space-4);
      }

      .leaderboard-controls,
      .filter-row {
        align-items: stretch;
      }

      .segmented {
        width: 100%;
        overflow-x: auto;
      }

      .segmented button {
        flex: 1 0 auto;
      }

      .reward-toast {
        right: var(--space-3);
        bottom: var(--space-3);
        width: calc(100vw - var(--space-6));
      }

      .planner-grid {
        grid-template-columns: 92px repeat(7, 68px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>

    function toDateKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
