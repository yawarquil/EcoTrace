    function parseDateKey(key) {
      const [year, month, day] = key.split('-').map(Number);
      return new Date(year, month - 1, day, 12);
    }

    function addDays(date, amount) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + amount);
      return copy;
    }

    function daysAgo(amount) {
      return addDays(TODAY, -amount);

    function formatDate(key, options) {
      return parseDateKey(key).toLocaleDateString('en-US', options || { month: 'short', day: 'numeric' });
    }

    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function round(value, decimals) {
      const factor = 10 ** (decimals || 0);
      return Math.round((Number(value) + Number.EPSILON) * factor) / factor;
    }

      return function seededRandom() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function restorePersistentState() {
      try {
        const raw = window.localStorage && window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== STORAGE_VERSION || !parsed.state) {
          window.localStorage.removeItem(STORAGE_KEY);
          return;
        }
        const saved = parsed.state;
        Object.assign(appState, saved);
        appState.profile = { name: 'EcoTrace User', commute: 'mixed', diet: 'flexitarian', homeEnergy: 'efficient', goal: 'reduce 20%', ...(saved.profile || {}) };
        appState.streaks = { logging: 0, tasks: 0, habits: 0, learning: 0, ...(saved.streaks || {}) };
        appState.simulator = { carTrips: 2, plantMeals: 3, energyPercent: 10, ...(saved.simulator || {}) };
        appState.carbonBudget = { monthlyLimit: 160, revisedAt: TODAY_KEY, ...(saved.carbonBudget || {}) };
        appState.aiInsights = { ...defaultAIInsightState(), ...(saved.aiInsights || {}) };
        if (appState.aiInsights.status === 'loading') appState.aiInsights.status = 'fallback';
        appState.aiChat = { ...defaultAIChatState(), ...(saved.aiChat || {}) };
        if (appState.aiChat.status === 'loading') appState.aiChat.status = 'idle';
        appState.logDraft = { ...defaultLogDraft(), ...(saved.logDraft || {}) };
        appState.currentView = routes.some(([view]) => view === appState.currentView) ? appState.currentView : 'dashboard';
      } catch (error) {
        console.warn('EcoTrace persisted state could not be restored.', error);
      }
    }

    function persistState() {
      try {
        if (!window.localStorage) return;
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify({
          version: STORAGE_VERSION,
          savedAt: new Date().toISOString(),
          state: appState
        }));
      } catch (error) {
        console.warn('EcoTrace state could not be persisted.', error);
      }
    }

    function seedEntries(random, days) {
      const entries = [];
      const categorySchedule = ['Transport', 'Food', 'Home Energy', 'Food', 'Shopping', 'Transport', 'Food'];
      for (let i = days - 1; i >= 0; i--) {
        const date = daysAgo(i);
        const dateKey = toDateKey(date);
        const weekday = date.getDay();
        const improvement = 1 - ((days - i) / days) * 0.18;

        const commuteKm = weekday === 0 || weekday === 6 ? 0 : Math.round(5 + random() * 17);
        if (commuteKm > 0) {
          const transitBias = random() + (i < 45 ? 0.22 : 0);
          const subtype = transitBias > 0.62 ? 'Train' : transitBias > 0.42 ? 'Bus' : random() > 0.72 ? 'Car electric' : 'Car petrol';
          const factor = getOption('Transport', subtype).factor;
          entries.push(makeEntry(dateKey, 'Transport', subtype, commuteKm, 'km', commuteKm * factor * improvement, 'Commute pattern'));
        }

        const mealSubtype = random() > 0.78 ? 'Beef meal' : random() > 0.5 ? 'Vegetarian meal' : random() > 0.26 ? 'Chicken meal' : 'Vegan meal';
        const mealQty = random() > 0.18 ? 1 : 2;
        entries.push(makeEntry(dateKey, 'Food', mealSubtype, mealQty, 'meal', mealQty * getOption('Food', mealSubtype).factor, 'Meal log'));

        if (i % 2 === 0) {
          const kwh = round(4.5 + random() * 8, 1);
          entries.push(makeEntry(dateKey, 'Home Energy', 'Electricity UK grid', kwh, 'kWh', kwh * EMISSION_FACTORS.energy.electricityUkGrid * improvement, 'Home electricity'));
        }

        if (random() > 0.79) {
          const subtype = random() > 0.58 ? 'Second-hand item' : 'New clothing item';
          entries.push(makeEntry(dateKey, 'Shopping', subtype, 1, 'item', getOption('Shopping', subtype).factor, 'Shopping choice'));
        }

        if (i === 116 || i === 48) {
          const km = i === 116 ? 760 : 1320;
          const subtype = i === 116 ? 'Short-haul flight' : 'Train trip';
          entries.push(makeEntry(dateKey, 'Travel', subtype, km, 'km', km * getOption('Travel', subtype).factor, 'Planned travel'));
        }

        if (i < 30 && random() > 0.7) {
          const action = QUICK_ACTIONS[Math.floor(random() * QUICK_ACTIONS.length)];
          entries.push({
            ...makeEntry(dateKey, action.category, action.title, 1, 'action', 0, 'Eco-positive action'),
            avoidedKg: action.avoidedKg
          });
        }

        void categorySchedule;
      }
      return entries;
    }

    function getOption(category, subtype) {
      return (LOG_OPTIONS[category] || []).find((option) => option.key === subtype) || (LOG_OPTIONS[category] || [])[0];
    }

    function calculateLogImpact(category, subtype, quantity) {
      const option = getOption(category, subtype);
      if (!option) return { co2kg: 0, unit: '', suggestion: 'Choose a category to see an alternative.', savedKg: 0, tone: 'low' };
      const safeQuantity = sanitizeNumber(quantity, 0, 100000, 0);
      const co2kg = round(safeQuantity * option.factor, 2);
      const alternativeImpact = round(safeQuantity * option.altFactor, 2);
      const savedKg = Math.max(0, round(co2kg - alternativeImpact, 2));
      const tone = co2kg > 12 ? 'high' : co2kg > 3 ? 'moderate' : 'low';
      return {
        co2kg,
        unit: option.unit,
        suggestion: `${option.alternative} would save about ${savedKg} kg CO2 for this entry.`,
        savedKg,
        tone,
        option
      };
    }

    function computeStats(state = appState) {
      const currentMonth = TODAY.getMonth();
      const currentYear = TODAY.getFullYear();
      const monthEntries = state.entries.filter((entry) => {
        const date = parseDateKey(entry.date);
        return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
      });
      const todayEntries = state.entries.filter((entry) => entry.date === TODAY_KEY);
      const monthCO2 = sum(monthEntries, 'co2kg');
      const todayCO2 = sum(todayEntries, 'co2kg');
      const avoidedMonth = monthEntries.reduce((total, entry) => total + (entry.avoidedKg || 0), 0);
      const weeklyData = computeWeeklyData(state.entries);
      const monthlyData = computeMonthlyData(state.entries);
      const categoryBreakdown = computeCategoryBreakdown(state.entries);
      const topEmissionCategory = getTopEmissionCategory(state);
      const carbonScore = computeCarbonScore({ monthCO2, avoidedMonth, streaks: state.streaks, entriesCount: state.entries.length });
      const levelInfo = computeLevelFromXP(state.xp);
      const peerFootprints = state.leaderboardUsers.filter((user) => user.id !== 'current-user').map((user) => user.footprint);
      const userPercentile = state.entries.length ? computePercentile(monthCO2, peerFootprints) : 0;
      return {
        hasEntries: state.entries.length > 0,
        todayCO2: round(todayCO2, 1),
        monthCO2: round(monthCO2, 1),
        yearlyProjection: round(monthCO2 * 12, 0),
        avoidedMonth: round(avoidedMonth, 1),
        weeklyData,
        monthlyData,
        categoryBreakdown,
        carbonScore,
        streaks: state.streaks,
        heatmap: computeHeatmapData(state.entries, 12),
        topEmissionCategory,
        reductionOpportunities: getPersonalizedInsights(state),
        userPercentile,
        levelInfo,
        taskProgress: computeTaskProgress(state),
        forecast: getReductionForecast(state)
      };
    }

    function computeCarbonScore(input) {
      const monthCO2 = Number(input.monthCO2 || 0);
      const avoidedMonth = Number(input.avoidedMonth || 0);
      const streakBonus = input.streaks ? Math.min(10, (input.streaks.logging || 0) * 0.7 + (input.streaks.habits || 0) * 0.45) : 0;
      if (input.entriesCount === 0 && avoidedMonth === 0 && streakBonus === 0) return 50;
      const base = 96 - monthCO2 * 0.22 + avoidedMonth * 0.22 + streakBonus;
      return Math.round(clamp(base, 18, 100));
    }

    function computeWeeklyData(entries) {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const key = toDateKey(daysAgo(i));
        const co2kg = round(entries.filter((entry) => entry.date === key).reduce((total, entry) => total + entry.co2kg, 0), 1);
        days.push({
          date: key,
          label: parseDateKey(key).toLocaleDateString('en-US', { weekday: 'short' }),
          co2kg,
          state: co2kg > 18 ? 'high' : co2kg > 8 ? 'moderate' : 'good'
        });
      }
      return days;
    }

    function computeMonthlyData(entries) {
      const months = [];
      for (let i = 5; i >= 0; i--) {
        const date = new Date(TODAY.getFullYear(), TODAY.getMonth() - i, 1, 12);
        const month = date.getMonth();
        const year = date.getFullYear();
        const value = entries.reduce((total, entry) => {
          const entryDate = parseDateKey(entry.date);
          return entryDate.getMonth() === month && entryDate.getFullYear() === year ? total + entry.co2kg : total;
        }, 0);
        months.push({
          key: `${year}-${pad(month + 1)}`,
          label: formatMonth(date),
          user: round(value, 1),
          global: 390
        });
      }
      return months;
    }

    function computeCategoryBreakdown(entries) {
      const monthStart = toDateKey(new Date(TODAY.getFullYear(), TODAY.getMonth(), 1, 12));
      const weekStart = toDateKey(daysAgo(7));
      const totals = Object.keys(CATEGORIES).map((category) => {
        const monthValue = entries.filter((entry) => entry.category === category && entry.date >= monthStart).reduce((total, entry) => total + entry.co2kg, 0);
        const lastWeek = entries.filter((entry) => entry.category === category && entry.date >= weekStart).reduce((total, entry) => total + entry.co2kg, 0);
        return { category, kg: round(monthValue, 1), lastWeek: round(lastWeek, 1) };
      });
      const total = totals.reduce((acc, item) => acc + item.kg, 0) || 1;
      return totals.map((item) => ({
        ...item,
        percent: round((item.kg / total) * 100, 1),
        color: CATEGORIES[item.category].color
      })).sort((a, b) => b.kg - a.kg);
    }

    function computeHeatmapData(entries, weeks = 12) {
      const start = addDays(TODAY, -(weeks * 7 - 1));
      const cells = [];
      for (let i = 0; i < weeks * 7; i++) {
        const date = addDays(start, i);
        const key = toDateKey(date);
        const entryActions = entries.filter((entry) => entry.date === key && (entry.avoidedKg || entry.co2kg <= 1.2));
        const habitActions = appState.habits.reduce((count, habit) => count + (habit.completedDates.includes(key) ? 1 : 0), 0);
        const taskActions = appState.completedTasks.filter((id) => id.endsWith(key)).length;
        const signal = appState.activitySignals.find((item) => item.date === key);
        const actions = entryActions.length + habitActions + taskActions + (signal ? signal.actions : 0);
        const avoided = entryActions.reduce((total, entry) => total + (entry.avoidedKg || 0), 0) + (signal ? signal.avoidedKg : 0) + habitActions * 0.9 + taskActions * 0.7;
        cells.push({
          date: key,
          actions,
          avoidedKg: round(avoided, 1),
          intensity: clamp(Math.ceil(actions / 2), 0, 4),
          inStreak: actions > 0 && key >= toDateKey(daysAgo(appState.streaks.logging || 0))
        });
      }
      return cells;
    }

    function computeHeatmapMonthMarkers(cells) {
      const markers = [];
      let lastMonthKey = '';
      (cells || []).forEach((cell, index) => {
        const date = parseDateKey(cell.date);
        const monthKey = `${date.getFullYear()}-${date.getMonth()}`;
        if (monthKey === lastMonthKey) return;
        markers.push({
          month: formatMonth(date),
          column: Math.floor(index / 7) + 1,
          date: cell.date
        });
        lastMonthKey = monthKey;
      });
      return markers.reduce((spaced, marker) => {
        const previous = spaced[spaced.length - 1];
        if (previous && marker.column - previous.column < 2) {
          spaced[spaced.length - 1] = marker;
        } else {
          spaced.push(marker);
        }
        return spaced;
      }, []);
    }

    function computeHabitStats(habit) {
      const dateSet = new Set(habit.completedDates || []);
      let current = 0;
      for (let i = 0; i < 365; i++) {
        if (dateSet.has(toDateKey(daysAgo(i)))) current += 1;
        else break;
      }
      let best = 0;
      let run = 0;
      for (let i = 364; i >= 0; i--) {
        const key = toDateKey(daysAgo(i));
        if (dateSet.has(key)) {
          run += 1;
          best = Math.max(best, run);
        } else {
          run = 0;
        }
      }
      let weekCount = 0;
      for (let i = 6; i >= 0; i--) {
        if (dateSet.has(toDateKey(daysAgo(i)))) weekCount += 1;
      }
      return {
        streakCurrent: current,
        streakBest: best,
        weeklyRate: Math.round((weekCount / 7) * 100),
        habitScore: Math.round(clamp((weekCount / 7) * 70 + Math.min(best, 14) * 2.1, 0, 100))
      };
    }

    function computeTaskProgress(state = appState) {
      const total = state.tasks.length || 1;
      const completed = state.tasks.filter((task) => task.status === 'completed').length;
      const inProgress = state.tasks.filter((task) => task.status === 'in progress').length;
      return {
        total,
        completed,
        inProgress,
        percent: Math.round((completed / total) * 100)
      };
    }

    function computeLeaderboardRankings(users, metric = 'xp', scope = 'friends') {
      const scoped = users.filter((user) => scope === 'global' || user.scope === scope || user.id === 'current-user');
      const direction = metric === 'footprint' ? 1 : -1;
      return scoped
        .slice()
        .sort((a, b) => direction * ((a[metric] || 0) - (b[metric] || 0)))
        .map((user, index) => ({ ...user, rank: index + 1 }));
    }

    function computeLevelFromXP(xp) {
      const current = LEVELS.slice().reverse().find((level) => xp >= level.xp) || LEVELS[0];
      const next = LEVELS.find((level) => level.xp > xp) || { ...current, xp: current.xp + 1200, level: current.level + 1, title: 'Planet Strategist' };
      const span = next.xp - current.xp;
      const progress = Math.round(((xp - current.xp) / span) * 100);
      return {
        level: current.level,
        title: current.title,
        xp,
        currentLevelXP: current.xp,
        nextLevelXP: next.xp,
        toNext: Math.max(0, next.xp - xp),
        progress: clamp(progress, 0, 100)
      };
    }

    function getUnlockedBadges(state = appState) {
      const entries = state.entries || [];
      const streaks = state.streaks || { logging: 0 };
      const hasEntries = entries.length > 0;
      const plantMeals = entries.filter((entry) => /Vegetarian|Vegan|Plant/i.test(entry.subtype)).length;
      const transit = entries.filter((entry) => /Bus|Train|Walk/i.test(entry.subtype)).length;
      const avoided = entries.reduce((total, entry) => total + (entry.avoidedKg || 0), 0);
      const weekly = computeWeeklyData(entries).reduce((total, day) => total + day.co2kg, 0);
      const quizHigh = (state.quizzes || []).some((quiz) => quiz.completed && quiz.score / quiz.questions.length >= 0.8);
      const completedChallenges = (state.challenges || []).filter((challenge) => challenge.status === 'completed').length;
      const rules = {
        'first-log': entries.length >= 1,
        'streak-3': streaks.logging >= 3,
        'streak-7': streaks.logging >= 7,
        'plant-pro': plantMeals >= 7,
        'transit-hero': transit >= 10,
        'low-week': hasEntries && weekly > 0 && weekly < 60,
        'quiz-master': quizHigh,
        'challenge-winner': completedChallenges >= 1,
        'earth-saver': avoided >= 50,
        'data-explorer': hasEntries && (state.currentView === 'insights' || entries.length >= 20)
      };
      return BADGE_DEFS.map((badge) => ({
        ...badge,
        unlocked: Boolean(rules[badge.id]),
        unlockedAt: rules[badge.id] ? badge.unlockedAt || TODAY_KEY : null
      })).filter((badge) => badge.unlocked);
    }

    function getAchievementProgress(state = appState) {
      const baseline = 275;
      const currentMonth = computeStatsWithoutRewards(state).monthCO2;
      const reducedPercent = state.entries.length ? Math.max(0, Math.round(((baseline - currentMonth) / baseline) * 100)) : 0;
      const completedTasks = state.completedTasks.length + state.tasks.filter((task) => task.status === 'completed').length;
      const quizAttempts = state.quizzes.filter((quiz) => quiz.completed).length + (state.quizSession.finished ? 1 : 0);
      const completedChallenges = state.challenges.filter((challenge) => challenge.status === 'completed').length;
      const values = {
        'activity-50': state.entries.length,
        'baseline-15': reducedPercent,
        'tasks-10': completedTasks,
        'quizzes-5': quizAttempts,
        'streak-14': state.streaks.logging,
        'challenges-3': completedChallenges
      };
      return ACHIEVEMENT_DEFS.map((achievement) => {
        const progress = Math.min(values[achievement.id] || 0, achievement.target);
        return {
          ...achievement,
          progress,
          unlocked: progress >= achievement.target,
          unlockedAt: progress >= achievement.target ? TODAY_KEY : null
        };
      });
    }

    function computeStatsWithoutRewards(state) {
      const currentMonth = TODAY.getMonth();
      const currentYear = TODAY.getFullYear();
      const monthCO2 = state.entries.reduce((total, entry) => {
        const date = parseDateKey(entry.date);
        return date.getMonth() === currentMonth && date.getFullYear() === currentYear ? total + entry.co2kg : total;
      }, 0);
      return { monthCO2: round(monthCO2, 1) };
    }

    function getPersonalizedInsights(state = appState) {
      if (!state.entries || state.entries.length === 0) {
        const starter = TIP_LIBRARY.find((tip) => tip.category === 'Transport') || TIP_LIBRARY[0];
        const quickWin = TIP_LIBRARY.filter((tip) => tip.effort === 'Low').sort((a, b) => b.savings - a.savings)[0];
        return [
          { title: 'Start with one real log', type: 'First signal', body: 'Add any commute, meal, energy use, shopping choice, or travel activity so EcoTrace can calculate your actual pattern.', savings: 0 },
          { title: 'Best starter action', type: 'Low effort', body: quickWin.title, savings: quickWin.savings },
          { title: 'Likely first lever', type: 'Setup-based suggestion', body: starter.title, savings: starter.savings }
        ];
      }
      const topCategory = getTopEmissionCategory(state);
      const categoryTip = TIP_LIBRARY.find((tip) => tip.category === topCategory) || TIP_LIBRARY[0];
      const quickWin = TIP_LIBRARY.filter((tip) => tip.effort === 'Low').sort((a, b) => b.savings - a.savings)[0];
      const annual = TIP_LIBRARY.slice().sort((a, b) => b.savings - a.savings)[0];
      return [
        { title: `Focus on ${topCategory}`, type: 'Highest source', body: categoryTip.title, savings: categoryTip.savings },
        { title: 'Best quick win', type: 'Easiest shift', body: quickWin.title, savings: quickWin.savings },
        { title: 'Annual savings lever', type: 'Largest opportunity', body: annual.title, savings: annual.savings * 12 }
      ];
    }

    function getReductionForecast(state = appState) {
      if (!state.entries || state.entries.length === 0) {
        const starter = TIP_LIBRARY.find((item) => item.category === 'Transport') || TIP_LIBRARY[0];
        return {
          headline: 'Log one activity to unlock a forecast based on your actual footprint.',
          monthly: 0,
          yearly: 0,
          topCategory: 'No logs yet',
          recommendation: starter.title
        };
      }
      const top = getTopEmissionCategory(state);
      const tip = TIP_LIBRARY.find((item) => item.category === top) || TIP_LIBRARY[0];
      const monthly = tip.savings;
      return {
        headline: `If you follow "${tip.title}", you could cut about ${monthly} kg CO2/month.`,
        monthly,
        yearly: monthly * 12,
        topCategory: top,
        recommendation: tip.title
      };
    }

    function getRecommendedTasks(state = appState) {
      const top = getTopEmissionCategory(state);
      return state.tasks.slice().sort((a, b) => Number(b.category === top) - Number(a.category === top));
    }

    function getRecommendedQuiz(state = appState) {
      return state.quizzes.find((quiz) => !quiz.completed) || state.quizzes[0];
    }

    function getTopEmissionCategory(state = appState) {
      const breakdown = computeCategoryBreakdown(state.entries || []);
      return (breakdown[0] && breakdown[0].category) || 'Transport';
    }

    function computeLoggingStreak(entries) {
      const dates = new Set(entries.map((entry) => entry.date));
      let streak = 0;
      for (let i = 0; i < 365; i++) {
        if (dates.has(toDateKey(daysAgo(i)))) streak += 1;
        else if (i === 0) continue;
        else break;
      }
      return streak;
    }

    function computePercentile(value, peers) {
      const better = peers.filter((peer) => value < peer).length;
      return Math.round((better / Math.max(peers.length, 1)) * 100);
    }

    function getProfileInitials(name = appState.profile.name) {
      const clean = sanitizeText(name || 'EcoTrace User', 48);
      return clean.split(/\s+/).filter(Boolean).map((part) => part[0]).join('').slice(0, 2).toUpperCase() || 'EU';
    }

    function getLeaderboardUsers(stats) {
      return appState.leaderboardUsers.map((user) => {
        if (user.id !== 'current-user') return user;
        return {
          ...user,
          name: appState.profile.name || 'EcoTrace User',
          initials: getProfileInitials(),
          score: stats.carbonScore,
          streak: appState.streaks.logging,
          xp: appState.xp,
          footprint: stats.monthCO2,
          level: stats.levelInfo.level,
          rankChange: 0
        };
      });
    }

    function sum(items, key) {
      return items.reduce((total, item) => total + Number(item[key] || 0), 0);
    }

    function syncRewards() {
      appState.badges = BADGE_DEFS.map((badge) => {
        const unlocked = getUnlockedBadges(appState).some((item) => item.id === badge.id);
        return { ...badge, unlocked, unlockedAt: unlocked ? TODAY_KEY : null };
      });
      appState.achievements = getAchievementProgress(appState);
      appState.level = computeLevelFromXP(appState.xp).level;
    }

    function awardXP(amount, reason) {
      if (!amount) return;
      const previousLevel = appState.level;
      appState.xp += amount;
      appState.level = computeLevelFromXP(appState.xp).level;
      syncRewards();
      const levelInfo = computeLevelFromXP(appState.xp);
      appState.rewardToast = {
        icon: appState.level > previousLevel ? `L${appState.level}` : `+${amount}`,
        title: appState.level > previousLevel ? 'Level unlocked' : 'Progress added',
        body: appState.level > previousLevel
          ? `${levelInfo.title} reached. ${levelInfo.toNext} XP to the next level.`
          : `+${amount} XP${reason ? ` for ${reason}` : ''}.`
      };
      updateHeader(computeStats(appState));
      updateRewardToastSurface();
      persistState();
      announce(`Earned ${amount} XP${reason ? ` for ${reason}` : ''}.`);
      if (appState.level > previousLevel) {
        announce(`Level ${appState.level} unlocked: ${computeLevelFromXP(appState.xp).title}.`);
        triggerConfetti();
      }
    }

    function announce(message) {
      const live = document.getElementById('live-region');
      if (live) live.textContent = message;
    }

    function scheduleRender() {
      persistState();
      if (renderQueued) return;
      renderQueued = true;
      requestAnimationFrame(() => {
        renderQueued = false;
        renderApp();
      });
    }

    function renderApp() {
      syncRewards();
      const app = document.getElementById('app');
      if (!app) return;
      const stats = computeStats(appState);
      app.setAttribute('aria-busy', 'false');
      app.className = '';
      app.innerHTML = routes.map(([view]) => `
        <section class="view-section ${appState.currentView === view ? 'is-active' : ''}" data-view="${view}" id="view-${view}" aria-labelledby="${view}-heading">
          ${renderView(view, stats)}
        </section>
      `).join('') + renderOnboarding() + renderReportOverlay(stats) + renderScenarioDrawer(stats);
      updateHeader(stats);
      updateNavigation();
      updateRewardToastSurface();
      animateCounters();
      if (appState.currentView === 'insights') {
        window.setTimeout(() => GoogleGeoChart.draw(), 0);
        ensureAIInsights(stats);
      }
    }

    function supportiveCopy(stats) {
      if (!stats.hasEntries) return 'Start with one real activity log. EcoTrace will build your score, trends, heatmap, goals, and coaching from what you actually record.';
      const diff = round(390 - stats.monthCO2, 1);
      if (diff > 0) return `You are tracking at ${diff} kg below the global monthly benchmark. Keep leaning into the repeatable swaps that already fit your week.`;
      return `You have a clear map of where impact is coming from. This week, one repeatable ${stats.topEmissionCategory.toLowerCase()} change can move the score fastest.`;
    }

    function computeImpactScenario(input = appState.simulator) {
      const carTrips = Number(input.carTrips || 0);
      const plantMeals = Number(input.plantMeals || 0);
      const energyPercent = Number(input.energyPercent || 0);
      const carTripSavings = carTrips * 2.5 * 4;
      const mealSavings = plantMeals * (EMISSION_FACTORS.food.beefMeal - EMISSION_FACTORS.food.vegetarianMeal) * 4;
      const energySavings = (energyPercent / 100) * 42;
      const monthly = round(carTripSavings + mealSavings + energySavings, 1);
      return {
        monthly,
        yearly: round(monthly * 12, 1),
        carTripSavings: round(carTripSavings, 1),
        mealSavings: round(mealSavings, 1),
        energySavings: round(energySavings, 1)
      };
    }

    function renderImpactSimulator(stats) {
      const scenario = computeImpactScenario(appState.simulator);
      const scoreLift = Math.min(12, Math.round(scenario.monthly / 8));
      return `
        <div class="simulator-layout" data-simulator>
          <div class="slider-stack">
            ${rangeControl('sim-car-trips', 'Car trips replaced / week', 'carTrips', appState.simulator.carTrips, 0, 8, scenario.carTripSavings)}
            ${rangeControl('sim-plant-meals', 'Plant-based meals / week', 'plantMeals', appState.simulator.plantMeals, 0, 14, scenario.mealSavings)}
            ${rangeControl('sim-energy', 'Home energy reduction', 'energyPercent', appState.simulator.energyPercent, 0, 30, scenario.energySavings, '%')}
          </div>
          <div class="forecast-card">
            <span class="status-tag" style="background:var(--accent-soft);color:var(--earth-50)">Projected</span>
            <strong data-simulator-total>${scenario.monthly}</strong>
            <p class="mb-0">kg CO2/month saved, or <span data-simulator-yearly>${scenario.yearly}</span> kg/year. Your score could rise about <span data-simulator-score>${scoreLift}</span> points if these swaps stick.</p>
            <button class="secondary-button" type="button" data-apply-simulator>Turn into goals</button>
          </div>
        </div>
      `;
    }

    function rangeControl(id, label, key, value, min, max, savings, suffix = '') {
      return `
        <div class="range-row">
          <label for="${id}"><span>${esc(label)}</span><strong data-simulator-value="${esc(key)}">${esc(value)}${suffix}</strong></label>
          <input id="${id}" type="range" min="${min}" max="${max}" value="${esc(value)}" data-simulator-input="${esc(key)}">
          <span class="tiny muted"><span data-simulator-saving="${esc(key)}">${savings}</span> kg CO2/month modeled from this lever</span>
        </div>
      `;
    }

    function updateSimulatorInput(key, rawValue) {
      if (!Object.hasOwn(appState.simulator, key)) return false;
      appState.simulator[key] = sanitizeNumber(rawValue, 0, 500, 0);
      persistState();
      const scenario = computeImpactScenario(appState.simulator);
      const scoreLift = Math.min(12, Math.round(scenario.monthly / 8));
      const suffix = key === 'energyPercent' ? '%' : '';
      const input = document.querySelector(`[data-simulator-input="${CSS.escape(key)}"]`);
      const value = document.querySelector(`[data-simulator-value="${CSS.escape(key)}"]`);
      const saving = document.querySelector(`[data-simulator-saving="${CSS.escape(key)}"]`);
      const total = document.querySelector('[data-simulator-total]');
      const yearly = document.querySelector('[data-simulator-yearly]');
      const score = document.querySelector('[data-simulator-score]');
      const savingsByKey = {
        carTrips: scenario.carTripSavings,
        plantMeals: scenario.mealSavings,
        energyPercent: scenario.energySavings
      };
      if (input) input.value = String(appState.simulator[key]);
      if (value) value.textContent = `${appState.simulator[key]}${suffix}`;
      if (saving) saving.textContent = savingsByKey[key];
      if (total) total.textContent = scenario.monthly;
      if (yearly) yearly.textContent = scenario.yearly;
      if (score) score.textContent = scoreLift;
      announce(`Simulator updated: ${scenario.monthly} kg CO2 per month.`);
      return true;
    }

    function getCoachRecommendation(stats) {
      if (!stats.hasEntries) {
        const starter = TIP_LIBRARY.find((item) => item.category === 'Transport') || TIP_LIBRARY[0];
        return {
          category: 'First log',
          action: starter.title,
          savings: starter.savings,
          message: 'EcoTrace is ready for your first real signal. Log one commute, meal, energy use, purchase, or travel activity and the coaching will switch from starter guidance to your measured pattern.',
          cta: 'Log first activity'
        };
      }
      const category = stats.topEmissionCategory || getTopEmissionCategory(appState);
      const tip = TIP_LIBRARY.find((item) => item.category === category) || TIP_LIBRARY[0];
      const tone = stats.taskProgress.percent >= 60 ? 'You already have momentum today.' : 'A small action would restart momentum today.';
      return {
        category,
        action: tip.title,
        savings: tip.savings,
        message: `${tone} Your ${category.toLowerCase()} footprint is the clearest next lever, so I would make "${tip.title}" your next best action.`,
        cta: category === 'Food' ? 'Add plant lunch task' : category === 'Transport' ? 'Add greener commute task' : 'Add action task'
      };
    }

    function renderCoachPanel(stats) {
      const coach = getCoachRecommendation(stats);
      return `
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Eco coach</h2>
              <p class="panel-kicker">Rule-based guidance that responds to your current data.</p>
            </div>
            <span class="level-tag">${esc(coach.category)}</span>
          </div>
          <div class="panel-body">
            <div class="coach-shell">
              <div class="coach-message">
                <strong>Coach note</strong>
                <p class="mb-0">${esc(coach.message)}</p>
              </div>
              <div class="button-row">
                <button class="action-button" type="button" ${coach.category === 'First log' ? 'data-route="log"' : 'data-coach-action="task"'}>${icon('plus')}${esc(coach.cta)}</button>
                ${coach.category === 'First log' ? '<button class="secondary-button" type="button" data-route="log">Choose category</button>' : '<button class="secondary-button" type="button" data-coach-action="goal">Add to goals</button>'}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function computeProgressStory(stats) {
      const baselineKg = 275;
      const currentKg = stats.monthCO2;
      if (!stats.hasEntries) {
        return {
          baselineKg,
          currentKg,
          avoidedKg: 0,
          percent: 0,
          equivalent: 'Add a first log to turn this into a real comparison.'
        };
      }
      const avoidedKg = round(Math.max(0, baselineKg - currentKg), 1);
      const percent = Math.round((avoidedKg / baselineKg) * 100);
      return {
        baselineKg,
        currentKg,
        avoidedKg,
        percent,
        equivalent: `${round(avoidedKg / 185, 1)} short-haul flight equivalents`
      };
    }

    function renderProgressStory(stats) {
      const story = computeProgressStory(stats);
      const headline = stats.hasEntries ? `${story.avoidedKg} kg CO2 avoided this month` : 'Your measured progress story starts with the first log';
      const body = stats.hasEntries
        ? `${story.equivalent}. Your strongest repeat loop is ${esc(appState.habits[1]?.title || 'vegetarian lunch')}.`
        : `${story.equivalent} EcoTrace will compare your current month against the benchmark only after you have actual entries.`;
      return `
        <article class="panel story-shell">
          <div class="panel-header no-border">
            <div>
              <h2 class="panel-title">Progress story</h2>
              <p class="panel-kicker">Before and after, without the guilt trip.</p>
            </div>
          </div>
          <div class="panel-body">
            <div class="story-meter">
              <span class="reward-tag">${story.percent}% below baseline</span>
              <h3>${headline}</h3>
              <p>${body}</p>
              <div class="story-bars">
                ${storyBar('Baseline', story.baselineKg, story.baselineKg, 'danger')}
                ${storyBar('Current', story.currentKg, story.baselineKg, 'success')}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function storyBar(label, value, max, tone) {
      const percent = clamp((value / max) * 100, 2, 100);
      return `
        <div class="story-bar">
          <span>${esc(label)}</span>
          <div class="progress-track"><div class="progress-fill ${tone}" style="--value:${percent}%"></div></div>
          <strong>${round(value, 1)} kg</strong>
        </div>
      `;
    }

    function computeCarbonBudget(stats, state = appState) {
      const limit = Math.max(40, Number(state.carbonBudget?.monthlyLimit || 160));
      const used = Number(stats.monthCO2 || 0);
      const daysInMonth = new Date(TODAY.getFullYear(), TODAY.getMonth() + 1, 0).getDate();
      const elapsed = TODAY.getDate();
      const daysLeft = Math.max(1, daysInMonth - elapsed + 1);
      const remaining = round(limit - used, 1);
      const projected = round((used / Math.max(1, elapsed)) * daysInMonth, 1);
      const percent = Math.round(clamp((used / limit) * 100, 0, 140));
      const status = remaining >= 0 ? 'On budget' : 'Over budget';
      return {
        limit,
        used: round(used, 1),
        remaining,
        projected,
        percent,
        daysLeft,
        dailyAllowance: round(Math.max(0, remaining) / daysLeft, 1),
        status,
        tone: remaining >= 20 ? 'success' : remaining >= 0 ? 'warning' : 'danger'
      };
    }

    function getBudgetNudge(stats, budget) {
      const top = stats.topEmissionCategory || 'Transport';
      const swaps = {
        Transport: 'choose one short transit, walk, or cycle swap before the next car trip',
        Food: 'make the next meal plant-forward and keep the choice easy to repeat',
        'Home Energy': 'trim one heating, cooling, or standby window today',
        Shopping: 'pause one nonessential purchase and let the budget breathe',
        Travel: 'check for a rail or local alternative before confirming another leg'
      };
      const action = swaps[top] || swaps.Transport;
      if (budget.remaining < 0) {
        return `You are ${Math.abs(budget.remaining)} kg over budget. First move: ${action}.`;
      }
      if (budget.projected > budget.limit) {
        return `Current pace lands ${round(budget.projected - budget.limit, 1)} kg above plan. Best lever: ${action}.`;
      }
      if (budget.dailyAllowance <= 2.5) {
        return `The finish line is tight. Protect the final ${budget.daysLeft} days and ${action}.`;
      }
      return `You have a ${round(budget.limit - budget.projected, 1)} kg projected buffer. Keep it steady and ${action}.`;
    }

    function computeBudgetRunway(stats, state = appState) {
      const budget = computeCarbonBudget(stats, state);
      const plan = generateWeeklyClimatePlan(stats, state);
      const planSavings = round(plan.reduce((total, day) => total + Number(day.impactKg || 0), 0), 1);
      const daysInMonth = new Date(TODAY.getFullYear(), TODAY.getMonth() + 1, 0).getDate();
      const elapsed = Math.max(1, TODAY.getDate());
      const dailyAverage = round(Math.max(1, budget.used / elapsed), 1);
      const projectedGap = round(budget.limit - budget.projected, 1);
      const bufferAfterPlan = round(projectedGap + planSavings, 1);
      const protectedDays = Math.min(
        budget.daysLeft,
        Math.max(0, Math.floor((Math.max(0, budget.remaining) + planSavings) / Math.max(1, dailyAverage)))
      );
      const nextAction = plan.find((day) => !day.done) || plan[0];
      return {
        budget,
        plan,
        planSavings,
        projectedGap,
        bufferAfterPlan,
        protectedDays,
        dailyAverage,
        dailyTarget: round(budget.limit / daysInMonth, 1),
        watchCategory: stats.topEmissionCategory || getTopEmissionCategory(state),
        nextAction
      };
    }

    function generateWeeklyClimatePlan(stats, state = appState) {
      const top = stats.topEmissionCategory || getTopEmissionCategory(state);
      const templates = {
        Transport: [
          ['Replace one short car trip', 2.5, 'Walk, cycle, or use transit for one local trip.'],
          ['Plan one transit-first errand', 1.8, 'Batch a journey and skip a solo car hop.']
        ],
        Food: [
          ['Choose a plant-forward meal', 5.9, "Use the beef-to-vegetarian swap as today's easy lever."],
          ['Make lunch vegetarian', 3.2, 'A repeatable lunch default keeps decisions light.']
        ],
        'Home Energy': [
          ['Reduce heating or cooling one hour', 1.4, 'Shorten one energy-heavy home window.'],
          ['Switch off standby loads', 0.8, 'Clear small devices before bedtime.']
        ],
        Shopping: [
          ['Delay one nonessential purchase', 3.5, 'Give the purchase 24 hours before deciding.'],
          ['Repair or reuse one item', 2.4, 'Extend the life of something already owned.']
        ],
        Travel: [
          ['Swap one travel leg to rail', 6.8, 'Look for a lower-carbon route before booking.'],
          ['Avoid one unnecessary long trip', 8.5, 'Replace the trip with a local alternative.']
        ]
      };
      const categories = [top, 'Food', 'Transport', 'Home Energy', 'Shopping', 'Travel']
        .filter((category, index, list) => category && list.indexOf(category) === index);
      return Array.from({ length: 7 }, (_, index) => {
        const date = toDateKey(addDays(TODAY, index));
        const category = categories[index % categories.length];
        const template = templates[category][index % templates[category].length];
        const id = `plan-${date}-${category.toLowerCase().replace(/[^a-z]+/g, '-')}`;
        return {
          id,
          date,
          category,
          title: template[0],
          impactKg: template[1],
          body: template[2],
          rewardXp: 18 + (index % 3) * 4,
          done: state.completedWeeklyPlan.includes(id)
        };
      });
    }

    function computeScenarioComparison(stats, state = appState) {
      const currentWeek = round(sum(stats.weeklyData, 'co2kg'), 1);
      const simulator = computeImpactScenario(state.simulator);
      const planSavings = round(generateWeeklyClimatePlan(stats, state).reduce((total, day) => total + day.impactKg, 0), 1);
      const weeklySavings = round(simulator.monthly / 4 + planSavings / 2, 1);
      const lowCarbonWeek = round(Math.max(currentWeek * 0.38, currentWeek - weeklySavings), 1);
      const effectiveSavings = round(Math.max(0, currentWeek - lowCarbonWeek), 1);
      return {
        currentWeek,
        lowCarbonWeek,
        weeklySavings: effectiveSavings,
        monthlySavings: round(effectiveSavings * 4, 1),
        scoreLift: Math.min(16, Math.max(1, Math.round((effectiveSavings * 4) / 9))),
        levers: [
          { label: 'Simulator swaps', value: round(simulator.monthly / 4, 1) },
          { label: 'Weekly plan actions', value: round(planSavings / 2, 1) },
          { label: 'Budget focus', value: computeCarbonBudget(stats, state).dailyAllowance }
        ]
      };
    }

          icon: 'CH',

        }

      return base.slice(0, 7);
    }

    function renderCarbonBudget(stats) {
      const budget = computeCarbonBudget(stats);
      const paceGap = round(budget.limit - budget.projected, 1);

    function renderBudgetRunway(stats) {

      const max = Math.max(...data.map((day) => day.co2kg), 1);

        return `
          <g tabindex="0" data-tip="${esc(tip)}">
            <rect class="bar" x="${x}" y="${y}" width="42" height="${height}" rx="6" fill="${color}" style="animation-delay:${index * 60}ms"></rect>

    function renderHeatmap(cells) {
      const monthMarkers = computeHeatmapMonthMarkers(cells);
      const columnCount = Math.max(1, Math.ceil(cells.length / 7));
      return `
        <div class="heatmap-scroller">
          <div class="heatmap-frame" style="--heat-columns:${columnCount}">
            <div class="heat-months" aria-hidden="true">${monthMarkers.map((marker) => `<span data-heat-month="${esc(marker.month)}" style="grid-column:${Math.max(1, marker.column)}">${marker.month}</span>`).join('')}</div>

    function buildAIChatFallback(question, stats = computeStats(appState)) {
      const top = stats.topEmissionCategory || 'Transport';
      const name = appState.profile.name || 'there';
      const latestEntry = getRecentEntriesForAI(1)[0];
      const recommendation = getPersonalizedInsights(appState)[0];
      if (!stats.hasEntries) {
        return {
          source: 'fallback',
          reply: `${name}, I do not have real activity logs for you yet, so I will not invent a footprint pattern. Start with one commute, meal, home energy use, purchase, or travel entry; then I can analyze your actual category mix, heatmap, goals, and next best action.`,
          suggestions: [
            'What should I log first?',
            'Help me choose a first activity',
            'What can I do today before logging?'
          ]
        };
      }
      const entryContext = latestEntry
        ? ` Your latest logged item is ${latestEntry.subtype} in ${latestEntry.category} at ${latestEntry.co2kg} kg CO2.`
        : ' Log one activity to give the coach a sharper signal.';
      return {
        source: 'fallback',
        reply: `${name}, based on your current EcoTrace data, ${top} is the strongest lever. You have ${stats.monthCO2} kg CO2 logged this month, ${stats.avoidedMonth} kg avoided, and a carbon score of ${stats.carbonScore}.${entryContext} A practical next step is: ${recommendation.body}.`,
        suggestions: [
          `Show my ${top.toLowerCase()} pattern`,
          'What should I do today?',
          'Summarize my recent logs'
        ]
      };

    function parseGeminiChatResponse(response, question, stats) {
      const fallback = buildAIChatFallback(question, stats);
      try {
        return normalizeAIChatResult(response, fallback) || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function normalizeAIChatResult(value, fallback) {
      if (!value) return null;
      if (typeof value === 'string') {
        const parsed = extractAIJson(value);
        if (parsed && parsed !== value) return normalizeAIChatResult(parsed, fallback);
        const looseReply = extractLooseAIReply(value);
        if (looseReply) {
          return normalizeAIChatReply(looseReply, fallback);
        }
        const clean = sanitizeInsightText(value, 900);
        if (!clean || /^[{\[]/.test(clean)) return null;
        return normalizeAIChatReply(clean, fallback);
      }
      if (typeof value !== 'object') return null;
      if (typeof value.reply === 'string') {
        const reply = sanitizeInsightText(value.reply, 900);
        if (!isAIChatReplyComplete(reply)) return null;
        return {
          source: 'gemini',
          reply,
          suggestions: Array.isArray(value.suggestions)
            ? value.suggestions.slice(0, 3).map((item) => sanitizeInsightText(item, 80)).filter(Boolean)
            : fallback.suggestions
        };
      }
      if (typeof value.text === 'string') return normalizeAIChatResult(value.text, fallback);
      const candidateText = value?.candidates?.[0]?.content?.parts?.map((part) => part.text || '').join('\n') || '';
      if (candidateText) return normalizeAIChatResult(candidateText, fallback);
      return null;
    }

    function normalizeAIChatReply(reply, fallback) {
      const clean = sanitizeInsightText(reply, 900);
      if (!isAIChatReplyComplete(clean)) return null;
      return { source: 'gemini', reply: clean, suggestions: fallback.suggestions };
    }

    function getAIChatDisplayText(text, fallbackText = '') {
      const parsed = extractAIJson(text);
      if (parsed?.reply) {
        const reply = sanitizeInsightText(parsed.reply, 900);
        return isAIChatReplyComplete(reply) ? reply : fallbackText;
      }
      const looseReply = extractLooseAIReply(text);
      if (looseReply) return isAIChatReplyComplete(looseReply) ? looseReply : fallbackText;
      const clean = sanitizeInsightText(text, 900);
      return isAIChatReplyComplete(clean) ? clean : fallbackText;
    }

    function isAIChatReplyComplete(text) {
      const clean = sanitizeInsightText(text, 900);
      if (!clean) return false;
      if (/[,:;–-]\s*$/.test(clean)) return false;
      if (!/[.!?)]$/.test(clean)) return false;
      if (/\b(and|or|but|because|with|from|to|for|of|your|my|the|a|an)\.?$/i.test(clean)) return false;
      return true;
    }

    function extractLooseAIReply(text) {
      const raw = String(text || '').trim();
      if (!raw || !/["']reply["']\s*:/.test(raw)) return '';
      const complete = raw.match(/["']reply["']\s*:\s*["']([\s\S]*?)["']\s*,\s*["']suggestions["']\s*:/i)
        || raw.match(/["']reply["']\s*:\s*["']([\s\S]*?)["']\s*}/i)
        || raw.match(/["']reply["']\s*:\s*["']([\s\S]*)/i);
      if (!complete) return '';
      return sanitizeInsightText(complete[1].replace(/\\"/g, '"').replace(/\\n/g, ' '), 900);
    }

    function normalizeAIInsightCards(cards, stats) {
      const fallback = buildAIInsightFallback(stats);
      if (!Array.isArray(cards)) return fallback.cards;
      const normalized = cards.slice(0, 3).map((card, index) => ({
        type: sanitizeInsightText(card?.type || fallback.cards[index]?.type || 'Insight', 42),
        title: sanitizeInsightText(card?.title || fallback.cards[index]?.title || 'EcoTrace insight', 72),
        body: sanitizeInsightText(card?.body || card?.rationale || fallback.cards[index]?.body || '', 260),
        action: sanitizeInsightText(card?.action || fallback.cards[index]?.action || '', 170),
        impact: sanitizeInsightText(card?.impact || fallback.cards[index]?.impact || 'Estimated impact', 70),
        confidence: sanitizeInsightText(card?.confidence || fallback.cards[index]?.confidence || 'Medium', 24)
      })).filter((card) => card.title && card.body && card.action);
      return normalized.length === 3 ? normalized : fallback.cards;
    }

    function extractAIJson(text) {
      const raw = String(text || '').trim();
      if (!raw) return null;
      const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
      const candidate = fenced ? fenced[1].trim() : raw;
      try {
        const parsed = JSON.parse(candidate);
        return typeof parsed === 'string' && parsed.trim() !== candidate ? extractAIJson(parsed) : parsed;
      } catch (error) {
        const start = candidate.indexOf('{');
        const end = candidate.lastIndexOf('}');
        if (start < 0 || end <= start) return null;
        try {
          const parsed = JSON.parse(candidate.slice(start, end + 1));
          return typeof parsed === 'string' ? extractAIJson(parsed) : parsed;
        } catch (innerError) {
          return null;
        }
      }
    }

    function parseGeminiInsightResponse(response, stats) {
      const fallback = buildAIInsightFallback(stats);
      try {
        const text = response?.candidates?.[0]?.content?.parts?.map((part) => part.text || '').join('\n') || '';
        const parsed = extractAIJson(text);
        if (!parsed) return fallback;
        return {
          source: 'gemini',
          summary: sanitizeInsightText(parsed.summary || fallback.summary, 220),
          cards: normalizeAIInsightCards(parsed.cards, stats)
        };
      } catch (error) {
        return fallback;
      }
    }

    function getAIInsightView(stats) {
      const fallback = buildAIInsightFallback(stats);
      const current = appState.aiInsights || defaultAIInsightState();
      const cards = current.cards && current.cards.length === 3 ? current.cards : fallback.cards;
      return {
        ...fallback,
        ...current,
        cards,
        summary: current.message || fallback.summary,
        source: current.source || fallback.source
      };
    }

    function ensureAIInsights(stats) {
      if (DEV_MODE) return;
      if (appState.currentView !== 'insights') return;
      if (appState.aiInsights.status !== 'idle') return;
      const idle = window.requestIdleCallback || ((callback) => window.setTimeout(callback, 1));
      idle(() => loadAIInsights(stats));
    }

    function updateAIChatSurface(stats = computeStats(appState)) {
      persistState();
      const chat = document.querySelector('[data-ai-chat]');
      if (!chat) return false;
      chat.outerHTML = renderAIChat(stats);
      return true;
    }

    async function loadAIInsights(stats = computeStats(appState), force = false) {
      if (appState.aiInsights.status === 'loading') return;
      if (!force && appState.aiInsights.status === 'ready') return;
      const fallback = buildAIInsightFallback(stats);
      appState.aiInsights = {
        status: 'loading',
        source: appState.aiInsights.source || 'fallback',
        updatedAt: appState.aiInsights.updatedAt,
        message: fallback.summary,
        cards: appState.aiInsights.cards?.length === 3 ? appState.aiInsights.cards : fallback.cards
      };
      scheduleRender();
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), 8500);
      try {
        const response = await fetch('/api/gemini-insights', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getAIInsightsPayload(stats)),
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`Gemini proxy responded ${response.status}`);
        const data = await response.json();
        const parsed = parseGeminiInsightResponse(data, stats);
        appState.aiInsights = {
          status: parsed.source === 'gemini' ? 'ready' : 'fallback',
          source: parsed.source,
          updatedAt: new Date().toISOString(),
          message: parsed.summary,
          cards: parsed.cards
        };
      } catch (error) {
        appState.aiInsights = {
          status: 'fallback',
          source: 'fallback',
          updatedAt: new Date().toISOString(),
          message: fallback.summary,
          cards: fallback.cards
        };
      } finally {
        window.clearTimeout(timeout);
        scheduleRender();
      }
    }

    async function sendAIChatMessage(question, stats = computeStats(appState)) {
      const cleanQuestion = sanitizeInsightText(question, 500);
      if (!cleanQuestion || appState.aiChat.status === 'loading') return;
      const userMessage = {
        role: 'user',
        text: cleanQuestion,
        timestamp: new Date().toISOString()
      };
      appState.aiChat.messages = [...(appState.aiChat.messages || []), userMessage].slice(-12);
      appState.aiChat.draft = '';
      appState.aiChat.status = 'loading';
      if (!updateAIChatSurface(stats)) scheduleRender();

      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), 10000);
      try {
        const response = await fetch('/api/gemini-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getAIChatPayload(cleanQuestion, stats)),
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`Gemini chat responded ${response.status}`);
        const data = await response.json();
        const parsed = parseGeminiChatResponse(data, cleanQuestion, stats);
        appState.aiChat.messages = [...appState.aiChat.messages, {
          role: 'assistant',
          text: parsed.reply,
          source: parsed.source,
          suggestions: parsed.suggestions,
          timestamp: new Date().toISOString()
        }].slice(-12);
      } catch (error) {
        const fallback = buildAIChatFallback(cleanQuestion, stats);
        appState.aiChat.messages = [...appState.aiChat.messages, {
          role: 'assistant',
          text: fallback.reply,
          source: 'fallback',
          suggestions: fallback.suggestions,
          timestamp: new Date().toISOString()
        }].slice(-12);
      } finally {
        window.clearTimeout(timeout);
        appState.aiChat.status = 'idle';
        if (!updateAIChatSurface(stats)) scheduleRender();
      }
    }

    function renderMonthlyLineChart(data) {
      const width = 700;
      const height = 290;
      const padX = 56;
      const padY = 34;
      const max = Math.max(...data.flatMap((item) => [item.user, item.global])) * 1.08;
      const points = data.map((item, index) => {
        const x = padX + index * ((width - padX * 2) / (data.length - 1));
        const y = height - padY - (item.user / max) * (height - padY * 2);
        return { ...item, x, y };
      });
      const globalPoints = data.map((item, index) => {
        const x = padX + index * ((width - padX * 2) / (data.length - 1));
        const y = height - padY - (item.global / max) * (height - padY * 2);
        return `${x},${y}`;
      }).join(' ');
      return `
        <svg class="line-chart" viewBox="0 0 ${width} ${height}" role="img" aria-labelledby="insights-heading">
          ${[0.25, 0.5, 0.75].map((ratio) => `<line class="chart-grid-line" x1="${padX}" y1="${height - padY - ratio * (height - padY * 2)}" x2="${width - padX}" y2="${height - padY - ratio * (height - padY * 2)}"></line>`).join('')}
          <polyline points="${globalPoints}" fill="none" stroke="var(--border-strong)" stroke-width="3" stroke-dasharray="7 7"></polyline>
          <polyline class="line-path" points="${points.map((point) => `${point.x},${point.y}`).join(' ')}" stroke="var(--accent)"></polyline>
          ${points.map((point) => `
            <g tabindex="0" data-tip="${esc(`${point.label}: ${point.user} kg CO2, global benchmark ${point.global} kg`)}">
              <circle class="chart-dot" cx="${point.x}" cy="${point.y}" r="5" fill="var(--accent)"></circle>
              <text class="chart-label" x="${point.x}" y="${height - 10}" text-anchor="middle">${point.label}</text>
            </g>
          `).join('')}
        </svg>
        ${renderDataTable('Monthly footprint trend', ['Month', 'Your kg CO2', 'Global average kg CO2'], data.map((item) => [item.label, item.user, item.global]))}
      `;
    }

    function renderDonut(items) {
      const rawTotal = items.reduce((value, item) => value + item.kg, 0);
      const total = rawTotal || 1;
      const circumference = 2 * Math.PI * 86;
      let offset = 0;
      const segments = items.map((item) => {
        const length = (item.kg / total) * circumference;
        const segment = `<circle class="donut-segment" role="button" tabindex="0" data-donut="${esc(item.category)}" data-tip="${esc(`${item.category}: ${item.kg} kg CO2`)}" cx="110" cy="110" r="86" stroke="${item.color}" stroke-dasharray="${length} ${circumference - length}" stroke-dashoffset="${-offset}"></circle>`;
        offset += length;
        return segment;
      }).join('');
      const selected = appState.selectedDonutCategory ? items.find((item) => item.category === appState.selectedDonutCategory) : items[0];
      return `
        <div class="donut-wrap">
          <div class="donut-box">
            <svg class="donut-chart" viewBox="0 0 220 220" aria-label="Category donut chart">
              <circle cx="110" cy="110" r="86" fill="none" stroke="var(--surface-pressed)" stroke-width="18"></circle>
              ${segments}
            </svg>
            <div class="donut-center">
              <div><strong>${round(rawTotal, 1)}</strong><br><span class="tiny muted">kg CO2</span></div>
            </div>
          </div>
          <div class="legend-list">
            ${items.map((item) => `
              <button class="legend-item ghost-button ${selected && selected.category === item.category ? 'is-active' : ''}" type="button" data-donut="${esc(item.category)}">
                <span class="category-swatch" style="--swatch:${item.color}"></span><span>${esc(item.category)}</span><strong>${item.percent}%</strong>
              </button>
            `).join('')}
            <div class="suggestion-panel">
              <strong>${esc((selected && selected.category) || 'Category')}</strong>
              <span>${esc((selected && selected.kg) || 0)} kg this month. ${esc(TIP_LIBRARY.find((tip) => selected && tip.category === selected.category)?.title || 'Keep logging for richer insights.')}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderBehaviorPatterns(stats) {
      if (!stats.hasEntries) {

        return `<div class="pattern-list">${patterns.map((item) => `<div class="pattern-item"><span class="status-dot"></span><div><h3>${esc(item.title)}</h3><p>${esc(item.body)}</p></div></div>`).join('')}</div>`;
      }
      const recentCar = appState.entries.filter((entry) => entry.date >= toDateKey(daysAgo(14)) && /Car/.test(entry.subtype)).length;
      const beefMeals = appState.entries.filter((entry) => entry.date >= toDateKey(daysAgo(30)) && entry.subtype === 'Beef meal').length;

      const weekend = stats.weeklyData.filter((_, index) => index >= 5).reduce((total, day) => total + day.co2kg, 0);
      const improving = stats.monthlyData.at(-1).user < stats.monthlyData.at(-2).user;
      const patterns = [
        { title: recentCar > 3 ? 'Frequent car usage' : 'Transport balance improving', body: recentCar > 3 ? 'Several recent car entries make transport the easiest category to nudge.' : 'Transit and low-impact commutes are showing up more often.' },

        { title: improving ? 'Trend is improving' : 'Trend needs a nudge', body: improving ? 'The last month is lower than the previous one.' : 'A repeatable top-category action would help reverse the latest trend.' }
      ];
      return `<div class="pattern-list">${patterns.map((item) => `<div class="pattern-item"><span class="status-dot"></span><div><h3>${esc(item.title)}</h3><p>${esc(item.body)}</p></div></div>`).join('')}</div>`;
    }

    function countryMapTone(value) {
      if (value >= 11000) return 4;
      if (value >= 7500) return 3;
      if (value >= 4200) return 2;
      if (value >= 1800) return 1;
      return 0;
    }

    function formatKgYear(value) {

    function cssVar(name) {

    const GoogleGeoChart = {
      draw() {
        const container = document.getElementById('geo-map');
        if (!container) return;
        try {
          if (!window.google?.charts) throw new Error('Google Charts loader is unavailable');
          window.google.charts.load('current', { packages: ['geochart'] });
          window.google.charts.setOnLoadCallback(() => this.render(container));
        } catch (error) {
          container.innerHTML = renderMapFallback('Google GeoChart is unavailable in this browser session.');
        }
      },
      render(container) {
        try {
          const rows = [['Country', 'kg CO2e per year', { role: 'tooltip', type: 'string' }]];
          COUNTRY_AVG.forEach((value, code) => {
            const name = COUNTRY_NAMES.get(code) || code;
            rows.push([name, value, `${name}: ${value.toLocaleString('en-US')} kg CO2e/year`]);
          });
          const data = window.google.visualization.arrayToDataTable(rows);
          const chart = new window.google.visualization.GeoChart(container);
          const options = {
            colorAxis: { colors: [cssVar('--map-low'), cssVar('--map-mid'), cssVar('--map-high')] },
            backgroundColor: 'transparent',
            datalessRegionColor: cssVar('--map-dataless'),
            legend: 'none',
            tooltip: { textStyle: { color: cssVar('--forest-900'), fontName: 'Satoshi' } },
            keepAspectRatio: true
          };
          chart.draw(data, options);
        } catch (error) {
          container.innerHTML = renderMapFallback('World map could not be rendered.');
        }
      }
    };

    function getGoalView(goal) {
      const monthStart = toDateKey(new Date(TODAY.getFullYear(), TODAY.getMonth(), 1, 12));
      const weekStart = toDateKey(daysAgo(6));
      const relevantEntries = appState.entries.filter((entry) => entry.date >= monthStart && entry.category === goal.category);
      let currentValue = Number(goal.currentValue || 0);
      let status = goal.status || 'ready';
      let direction = 'toward';

      if (goal.id === 'goal-plant' || /plant/i.test(goal.title)) {
        const plantEntries = appState.entries.filter((entry) => entry.date >= weekStart && /Vegetarian|Vegan|Plant/i.test(entry.subtype)).length;
        const habit = appState.habits.find((item) => item.id === 'veg-lunch');
        const habitMeals = habit ? habit.completedDates.filter((date) => date >= weekStart).length : 0;
        currentValue = Math.max(plantEntries, habitMeals);
        status = currentValue ? (currentValue >= goal.targetValue ? 'complete' : 'building') : 'waiting for logs';
      } else if (goal.category === 'Home Energy') {
        direction = 'below';
        currentValue = round(relevantEntries.reduce((total, entry) => total + Number(entry.quantity || 0), 0), 1);
        status = relevantEntries.length ? (currentValue <= goal.targetValue ? 'on track' : 'watching') : 'waiting for logs';
      } else if (goal.category === 'Transport') {
        direction = 'below';
        currentValue = round(relevantEntries.reduce((total, entry) => total + Number(entry.co2kg || 0), 0), 1);
        status = relevantEntries.length ? (currentValue <= goal.targetValue ? 'on track' : 'watching') : 'waiting for logs';
      }

      const progress = direction === 'below'
        ? (relevantEntries.length ? clamp(((goal.targetValue - currentValue) / goal.targetValue) * 100, 0, 100) : 0)
        : clamp((currentValue / goal.targetValue) * 100, 0, 100);
      return { ...goal, currentValue, status, progress };
    }

            <div class="quiz-feedback" aria-live="polite">

              <p>${esc(question.explanation)}</p>
              <button class="action-button mt-3" type="button" data-quiz-next>${session.index === questions.length - 1 ? 'Finish quiz' : 'Next question'}</button>

          ` : ''}
        </div>
      `;

    function updateHeader(stats = computeStats(appState)) {

      if (scorePill) scorePill.innerHTML = `<span class="status-dot"></span><span>Score ${stats.carbonScore}</span>`;

    function updateNavigation() {
      const desktop = document.getElementById('desktop-nav');
      const drawer = document.getElementById('drawer-nav');
      if (desktop) desktop.innerHTML = navHTML();
      if (drawer) drawer.innerHTML = navHTML();
    }

    function applyTheme() {
      document.documentElement.dataset.theme = appState.theme;
      persistState();
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) themeToggle.setAttribute('aria-label', appState.theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
      updateHeader();

    function navigate(view) {
      if (!routes.some(([route]) => route === view)) view = 'dashboard';
      appState.currentView = view;
      if (window.location.hash !== `#${view}`) window.location.hash = view;
      closeDrawer();
      scheduleRender();
    }

    function updateBudgetSurface(value) {
      appState.carbonBudget.monthlyLimit = sanitizeNumber(value, 40, 800, 160);
      appState.carbonBudget.revisedAt = TODAY_KEY;
      const stats = computeStats(appState);
      const budget = computeCarbonBudget(stats);
      const paceGap = round(budget.limit - budget.projected, 1);
      const setText = (selector, text) => {
        const node = document.querySelector(selector);
        if (node) node.textContent = text;
      };
      setText('[data-budget-status]', budget.status);
      setText('[data-budget-remaining]', budget.remaining);
      setText('[data-budget-copy]', `${budget.used} of ${budget.limit} kg CO2 used. ${budget.dailyAllowance} kg/day available across ${budget.daysLeft} days.`);
      setText('[data-budget-projected]', `${budget.projected} kg projected`);
      setText('[data-budget-daily]', budget.dailyAllowance);
      setText('[data-budget-monthend]', budget.projected);
      setText('[data-budget-gap]', Math.abs(paceGap));
      setText('[data-budget-gap-label]', `kg ${paceGap >= 0 ? 'projected buffer' : 'projected over'}`);
      setText('[data-budget-nudge-text]', getBudgetNudge(stats, budget));
      const progress = document.querySelector('[data-budget-progress]');
      if (progress) progress.setAttribute('aria-valuenow', String(Math.min(100, budget.percent)));
      const fill = document.querySelector('[data-budget-fill]');
      if (fill) {
        fill.className = `progress-fill ${budget.tone}`;
        fill.style.setProperty('--value', `${Math.min(100, budget.percent)}%`);
      }
      const runway = document.querySelector('[data-budget-runway]');
      if (runway) runway.outerHTML = renderBudgetRunway(stats);
      persistState();
      return true;
    }

    function updateTipFilterSurface(value) {
      appState.tipsFilter = sanitizeText(value) || 'All';
      const grid = document.querySelector('[data-tip-grid]');
      if (grid) {
        const activeTips = TIP_LIBRARY.filter((tip) => appState.tipsFilter === 'All' || tip.category === appState.tipsFilter);
        grid.innerHTML = activeTips.map(renderTipCard).join('');
      }
      persistState();
      announce(`Tips filtered by ${appState.tipsFilter}.`);
      return Boolean(grid);
    }

    function updateLeaderboardSurface() {
      const section = document.querySelector('[data-view="leaderboard"]');
      if (!section) return false;
      section.innerHTML = renderLeaderboard(computeStats(appState));
      persistState();
      return true;
    }

    function updateDonutSurface(category) {
      appState.selectedDonutCategory = sanitizeText(category);
      const donut = document.querySelector('.donut-wrap');
      if (!donut) return false;
      donut.outerHTML = renderDonut(computeStats(appState).categoryBreakdown);
      persistState();
      announce(`${appState.selectedDonutCategory} category selected.`);
      return true;
    }

    function updateLogImpactSurface(target) {
      const form = target.form;
      if (!form) return false;
      const data = new FormData(form);
      appState.logDraft.subtype = data.get('subtype') || appState.logDraft.subtype;
      appState.logDraft.quantity = sanitizeNumber(data.get('quantity'), 0, 100000, 0);
      appState.logDraft.date = data.get('date') || TODAY_KEY;
      appState.logDraft.note = sanitizeText(data.get('note'));
      const impact = calculateLogImpact(appState.logDraft.category, appState.logDraft.subtype, appState.logDraft.quantity);
      const label = document.querySelector('[data-log-quantity-label]');
      if (label) label.textContent = (impact.option && impact.option.quantityLabel) || 'Amount';
      const live = document.querySelector('[data-log-live-impact]');
      if (live) {
        live.innerHTML = `<strong>Live impact: ${esc(impact.co2kg)} kg CO2</strong><span>${esc(impact.suggestion)}</span>`;
      }
      persistState();
      return true;
    }

    function updateRewardToastSurface() {
      const existing = document.querySelector('[data-reward-toast]');
      if (!appState.rewardToast) {
        if (existing) existing.remove();
        persistState();
        return false;
      }
      if (existing) {
        const iconNode = existing.querySelector('[data-reward-icon]');
        const titleNode = existing.querySelector('[data-reward-title]');
        const bodyNode = existing.querySelector('[data-reward-body]');
        if (iconNode) iconNode.textContent = appState.rewardToast.icon || 'XP';
        if (titleNode) titleNode.textContent = appState.rewardToast.title || 'Progress added';
        if (bodyNode) bodyNode.textContent = appState.rewardToast.body || '';
        return true;
      }
      document.body.insertAdjacentHTML('beforeend', renderRewardToast());
      return true;
    }

    function updateDashboardActionSurfaces(stats = computeStats(appState)) {
      updateHeader(stats);
      const taskProgress = document.querySelector('[data-task-progress]');
      if (taskProgress) taskProgress.textContent = `${stats.taskProgress.completed}/${stats.taskProgress.total} done`;
      const taskList = document.querySelector('[data-task-list]');
      if (taskList) taskList.innerHTML = getRecommendedTasks(appState).map(renderTaskCard).join('');
      document.querySelectorAll('[data-dashboard-heatmap], [data-insights-heatmap]').forEach((panel) => {
        const active = panel.querySelector('[data-heatmap-active]');
        const body = panel.querySelector('[data-heatmap-body]') || panel.querySelector('.panel-body');
        if (active) active.textContent = `${stats.heatmap.filter((day) => day.actions > 0).length} active days`;
        if (body) body.innerHTML = renderHeatmap(stats.heatmap);
      });
      const runway = document.querySelector('[data-budget-runway]');
      if (runway) runway.outerHTML = renderBudgetRunway(stats);
      const weeklyPlan = document.querySelector('[data-weekly-plan]');
      if (weeklyPlan) weeklyPlan.outerHTML = renderWeeklyClimatePlan(stats);
      persistState();
      return Boolean(taskList || document.querySelector('[data-dashboard-heatmap]') || document.querySelector('[data-insights-heatmap]'));
    }

    function updateTaskSurface(taskId) {
      const updated = updateDashboardActionSurfaces(computeStats(appState));
      const task = appState.tasks.find((item) => item.id === taskId);
      if (task) announce(`${task.title} completed.`);
      return updated;
    }

    function updateHabitSurface(habitId) {
      const stats = computeStats(appState);
      updateHeader(stats);
      const habitList = document.querySelector('[data-habit-list]');
      if (habitList) habitList.innerHTML = appState.habits.map(renderHabitCard).join('');
      const goalList = document.querySelector('[data-goal-list]');
      if (goalList) goalList.innerHTML = appState.goals.map(renderGoalCard).join('');
      updateDashboardActionSurfaces(stats);
      const habit = appState.habits.find((item) => item.id === habitId);
      if (habit) announce(`${habit.title} updated.`);
      persistState();
      return Boolean(habitList || goalList);
    }

    function bindEvents() {
      document.addEventListener('click', onDocumentClick);
      document.addEventListener('input', onDocumentInput);
      document.addEventListener('change', onDocumentChange);
      document.addEventListener('submit', onDocumentSubmit);
      document.addEventListener('mouseover', showTooltip);
      document.addEventListener('focusin', showTooltip);
      document.addEventListener('mouseout', hideTooltip);
      document.addEventListener('focusout', hideTooltip);
      window.addEventListener('hashchange', () => {
        const view = window.location.hash.replace('#', '');
        if (view && view !== appState.currentView) {
          appState.currentView = routes.some(([route]) => route === view) ? view : 'dashboard';
          scheduleRender();
        }
      });
      window.addEventListener('scroll', () => {
        document.getElementById('site-header')?.classList.toggle('is-scrolled', window.scrollY > 8);
      }, { passive: true });
      window.addEventListener('keydown', (event) => {
        if (event.target?.matches?.('[data-ai-chat-input]') && event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
          event.preventDefault();
          event.target.closest('[data-ai-chat-form]')?.requestSubmit();
          return;
        }
        if (event.key !== 'Escape') return;
        if (appState.reportOpen) {
          appState.reportOpen = false;
          scheduleRender();
        }
        if (appState.scenarioDrawerOpen) {
          appState.scenarioDrawerOpen = false;
          scheduleRender();
        }
        closeDrawer();
      });
    }

    function selectOnboardingOption(payload) {
      const [key, value] = String(payload || '').split('|');
      if (!key || !Object.hasOwn(appState.profile, key)) return;
      appState.profile[key] = sanitizeText(value);
      announce(`${key} preference updated.`);
      persistState();
      updateOnboardingSurface('option');
    }

    function updateOnboardingName(value) {
      appState.profile.name = sanitizeText(value) || 'EcoTrace User';
      persistState();
      announce('Display name updated.');
    }

    function updateOnboardingSurface(mode = 'step') {
      const panel = document.querySelector('[data-onboarding-panel]');
      if (!panel) return false;
      const body = panel.querySelector('[data-onboarding-body]');
      const stepLabel = panel.querySelector('[data-onboarding-step-label]');
      const steps = getOnboardingSteps();
      if (stepLabel) stepLabel.textContent = `Step ${appState.onboardingStep + 1} of ${steps.length}`;
      if (mode === 'option') {
        panel.querySelectorAll('[data-onboarding-option]').forEach((button) => {
          const [key, value] = button.dataset.onboardingOption.split('|');
          button.setAttribute('aria-pressed', String(appState.profile[key] === value));
        });
        return true;
      }
      if (!body) return false;
      body.classList.remove('is-step-enter');
      void body.offsetWidth;
      body.innerHTML = renderOnboardingBody(appState.onboardingStep);
      body.classList.add('is-step-enter');
      return true;
    }

    function closeOnboardingSurface() {
      const panel = document.querySelector('[data-onboarding-panel]');
      if (!panel) {
        scheduleRender();
        return;
      }
      panel.classList.add('is-closing');
      window.setTimeout(() => scheduleRender(), 170);
    }

    function completeOnboarding() {
      appState.onboardingDismissed = true;
      appState.onboardingStep = 0;
      if (appState.profile.commute === 'car') appState.simulator.carTrips = Math.max(appState.simulator.carTrips, 4);
      if (appState.profile.commute === 'transit') appState.simulator.carTrips = Math.min(appState.simulator.carTrips, 1);
      if (appState.profile.diet === 'meat-heavy') appState.simulator.plantMeals = Math.max(appState.simulator.plantMeals, 5);
      if (appState.profile.diet === 'vegan') appState.simulator.plantMeals = Math.min(appState.simulator.plantMeals, 2);
      appState.coachMode = appState.profile.goal === 'build habits' ? 'streak-builder' : 'weekly-plan';
      awardXP(35, 'personalizing EcoTrace');
      closeOnboardingSurface();
    }

    function advanceOnboarding() {
      const lastStep = getOnboardingSteps().length - 1;
      if (appState.onboardingStep >= lastStep) {
        completeOnboarding();
        return;
      }
      appState.onboardingStep += 1;
      updateOnboardingSurface('step');
    }

    function applySimulatorGoals() {
      const scenario = computeImpactScenario(appState.simulator);
      if (scenario.monthly <= 0) {
        appState.rewardToast = {
          icon: '0',
          title: 'Adjust the sliders',
          body: 'Choose at least one swap before turning the forecast into goals.'
        };
        scheduleRender();
        return;
      }
      const goalDefs = [
        {
          sourceValue: Number(appState.simulator.carTrips || 0),
          title: `Replace ${appState.simulator.carTrips} car trips each week`,
          category: 'Transport',
          targetValue: Math.max(1, Number(appState.simulator.carTrips || 0) * 4),
          unit: 'trips',
          rewardXp: 120
        },
        {
          sourceValue: Number(appState.simulator.plantMeals || 0),
          title: `Plan ${appState.simulator.plantMeals} plant-based meals each week`,
          category: 'Food',
          targetValue: Math.max(1, Number(appState.simulator.plantMeals || 0) * 4),
          unit: 'meals',
          rewardXp: 110
        },
        {
          sourceValue: Number(appState.simulator.energyPercent || 0),
          title: `Reduce home energy by ${appState.simulator.energyPercent}%`,
          category: 'Home Energy',
          targetValue: Math.max(1, Number(appState.simulator.energyPercent || 0)),
          unit: '%',
          rewardXp: 100
        }
      ].filter((goal) => goal.sourceValue > 0);
      goalDefs.forEach((goal) => {
        if (appState.goals.some((item) => item.title === goal.title)) return;
        appState.goals.push({
          id: uid('goal'),
