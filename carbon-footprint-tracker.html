          category: goal.category,
          targetValue: goal.targetValue,
          unit: goal.unit,
          rewardXp: goal.rewardXp,
          currentValue: 0,
          deadline: toDateKey(addDays(TODAY, 30)),
          status: 'new'
        });
      });
      awardXP(24, 'turning a forecast into goals');
      navigate('goals');
    }

    function handleCoachAction(kind) {
      const stats = computeStats(appState);
      const coach = getCoachRecommendation(stats);
      if (kind === 'goal') {
        const title = `${coach.category} coaching goal: ${coach.action}`;
        if (!appState.goals.some((goal) => goal.title === title)) {
          appState.goals.push({
            id: uid('goal'),
            title,
            category: coach.category,
            targetValue: Math.max(5, Math.round(coach.savings * 4)),
            currentValue: 0,
            unit: 'kg CO2',
            deadline: toDateKey(addDays(TODAY, 21)),
            status: 'coach planned',
            rewardXp: 115
          });
        }
        awardXP(18, 'accepting a coach goal');
        navigate('goals');
        return;
      }
      const taskTitle = `Coach pick: ${coach.action}`;
      if (!appState.tasks.some((task) => task.title === taskTitle)) {
        appState.tasks.unshift({
          id: uid('task'),
          title: taskTitle,
          category: coach.category,
          rewardXp: 38,
          status: 'not started',
          date: TODAY_KEY
        });
      }
      awardXP(14, 'accepting a coach task');
      navigate('dashboard');
    }

    function togglePlannedHabit(payload) {
      const [date, habitId] = String(payload || '').split('|');
      if (!date || !habitId || !appState.habits.some((habit) => habit.id === habitId)) return;
      if (!appState.plannedHabits[date]) appState.plannedHabits[date] = {};
      const planned = !appState.plannedHabits[date][habitId];
      appState.plannedHabits[date][habitId] = planned;
      if (planned) awardXP(6, 'planning a habit');
      announce(planned ? 'Habit planned.' : 'Habit removed from plan.');
      scheduleRender();
    }

    function completeWeeklyPlanItem(id) {
      const plan = generateWeeklyClimatePlan(computeStats(appState));
      const item = plan.find((day) => day.id === id);
      if (!item || appState.completedWeeklyPlan.includes(id)) return;
      appState.completedWeeklyPlan.push(id);
      appState.entries.push({
        ...makeEntry(item.date, item.category, item.title, 1, 'plan action', 0, 'Weekly climate plan'),
        avoidedKg: item.impactKg
      });
      appState.streaks.logging = computeLoggingStreak(appState.entries);
      awardXP(item.rewardXp, item.title.toLowerCase());
      updateChallenges({ category: item.category, avoidedKg: item.impactKg });
      scheduleRender();
    }

    function applyScenarioAsGoals() {
      const stats = computeStats(appState);
      const scenario = computeScenarioComparison(stats);
      const title = `Low-carbon week: save ${scenario.weeklySavings} kg`;
      if (!appState.goals.some((goal) => goal.title === title)) {
        appState.goals.push({
          id: uid('goal'),
          title,
          category: stats.topEmissionCategory,
          targetValue: scenario.weeklySavings,
          currentValue: 0,
          unit: 'kg CO2',
          deadline: toDateKey(addDays(TODAY, 7)),
          status: 'scenario planned',
          rewardXp: 140
        });

      awardXP(28, 'applying a low-carbon scenario');

    function selectReflectionMood(mood) {
      appState.selectedReflectionMood = sanitizeText(mood) || 'steady';
      document.querySelectorAll('[data-reflection-mood]').forEach((button) => {
        button.setAttribute('aria-pressed', String(button.dataset.reflectionMood === appState.selectedReflectionMood));

    function saveReflection(form) {

        date: TODAY_KEY,

      };

    function copyReportSummary() {
      const report = generateMonthlyReport(computeStats(appState));

    function onDocumentClick(event) {
      const route = event.target.closest('[data-route]');
      if (route) {
        event.preventDefault();
        navigate(route.dataset.route);
        return;
      }
      if (event.target.closest('#theme-toggle')) {
        appState.theme = appState.theme === 'light' ? 'dark' : 'light';
        applyTheme();
        return;
      }
      if (event.target.closest('#menu-toggle')) {
        openDrawer();
        return;
      }
      if (event.target.closest('#drawer-close') || event.target.closest('#drawer-backdrop')) {
        closeDrawer();
        return;
      }
      const onboardingOption = event.target.closest('[data-onboarding-option]');
      if (onboardingOption) {
        selectOnboardingOption(onboardingOption.dataset.onboardingOption);
        return;
      }
      if (event.target.closest('[data-onboarding-next]')) {
        advanceOnboarding();
        return;
      }
      if (event.target.closest('[data-onboarding-back]')) {
        appState.onboardingStep = Math.max(0, appState.onboardingStep - 1);
        updateOnboardingSurface('step');
        return;
      }
      if (event.target.closest('[data-onboarding-skip]')) {
        appState.onboardingDismissed = true;
        closeOnboardingSurface();
        return;
      }
      if (event.target.closest('[data-open-report]')) {
        appState.reportOpen = true;
        scheduleRender();
        return;
      }
      if (event.target.closest('[data-close-report]')) {
        appState.reportOpen = false;
        scheduleRender();
        return;
      }
      if (event.target.closest('[data-report-copy]')) {
        copyReportSummary();
        return;
      }
      if (event.target.closest('[data-ai-refresh]')) {
        loadAIInsights(computeStats(appState), true);
        return;

      const chatPrompt = event.target.closest('[data-ai-chat-prompt]');

        sendAIChatMessage(chatPrompt.dataset.aiChatPrompt, computeStats(appState));
        return;
      }
      if (event.target.closest('[data-dismiss-toast]')) {
        appState.rewardToast = null;
        updateRewardToastSurface();
        return;
      }
      if (event.target.closest('[data-open-scenario]')) {
        appState.scenarioDrawerOpen = true;
        scheduleRender();
        return;
      }
      if (event.target.closest('[data-close-scenario]')) {
        appState.scenarioDrawerOpen = false;
        scheduleRender();
        return;
      }
      if (event.target.closest('[data-scenario-apply]')) {
        applyScenarioAsGoals();
        return;
      }
      const planComplete = event.target.closest('[data-plan-complete]');

        completeWeeklyPlanItem(planComplete.dataset.planComplete);
        return;
      }
      const reflectionMood = event.target.closest('[data-reflection-mood]');
      if (reflectionMood) {
        selectReflectionMood(reflectionMood.dataset.reflectionMood);
        return;
      }
      if (event.target.closest('[data-apply-simulator]')) {
        applySimulatorGoals();
        return;
      }
      const coachAction = event.target.closest('[data-coach-action]');
      if (coachAction) {
        handleCoachAction(coachAction.dataset.coachAction);

      }
      const plannerToggle = event.target.closest('[data-planner-toggle]');
      if (plannerToggle) {
        togglePlannedHabit(plannerToggle.dataset.plannerToggle);
        return;
      }
      const logCategory = event.target.closest('[data-log-category]');
      if (logCategory) {

        scheduleRender();
        return;
      }
      if (event.target.closest('[data-log-back]')) {
        appState.logDraft.step = Math.max(1, appState.logDraft.step - 1);
        scheduleRender();
        return;
      }
      if (event.target.closest('[data-log-review]')) {
        appState.logDraft.step = 3;
        scheduleRender();
        return;
      }
      if (event.target.closest('[data-log-submit]')) {
        submitLogEntry();
        return;
      }

      if (focusLog) {
        const category = focusLog.dataset.focusLog;
        appState.logDraft = { ...defaultLogDraft(), step: 2, category, subtype: LOG_OPTIONS[category][0].key, unit: LOG_OPTIONS[category][0].unit };
        navigate('log');
        return;
      }
      const quick = event.target.closest('[data-quick-action]');
      if (quick) {
        completeQuickAction(quick.dataset.quickAction);
        return;
      }
      const task = event.target.closest('[data-complete-task]');
      if (task) {
        completeTask(task.dataset.completeTask);
        return;
      }
      const habit = event.target.closest('[data-habit-toggle]');
      if (habit) {
        toggleHabit(habit.dataset.habitToggle);
        return;
      }
      const donut = event.target.closest('[data-donut]');
      if (donut) {
        updateDonutSurface(donut.dataset.donut);
        return;
      }

      if (scope) {
        appState.selectedLeaderboardScope = scope.dataset.leaderScope;
        updateLeaderboardSurface();
        return;
      }
      const metric = event.target.closest('[data-leader-metric]');
      if (metric) {
        appState.selectedLeaderboardMetric = metric.dataset.leaderMetric;
        updateLeaderboardSurface();
        return;
      }
      const answer = event.target.closest('[data-quiz-answer]');
      if (answer) {
        answerQuiz(Number(answer.dataset.quizAnswer));
        return;
      }
      if (event.target.closest('[data-quiz-next]')) {
        nextQuizQuestion();
        return;
      }
      if (event.target.closest('[data-quiz-retry]')) {
        appState.quizSession = { quizId: 'climate-basics', index: 0, answers: [], selected: null, finished: false };
        scheduleRender();
        return;
      }
      const tip = event.target.closest('[data-complete-tip]');
      if (tip) {
        completeTip(tip.dataset.completeTip);
        return;
      }
      const tipChallenge = event.target.closest('[data-tip-challenge]');
      if (tipChallenge) {
        startChallenge(tipChallenge.dataset.tipChallenge, 'actions', 5, 130);

      }
      const start = event.target.closest('[data-start-challenge]');
      if (start) {
        startChallenge(start.dataset.startChallenge, start.dataset.challengeType, Number(start.dataset.challengeTarget), Number(start.dataset.challengeReward));
        return;
      }
      const completeChallenge = event.target.closest('[data-complete-challenge]');
      if (completeChallenge) {
        claimChallenge(completeChallenge.dataset.completeChallenge);
      }

        sendAIChatMessage(data.get('question'), computeStats(appState));

    function submitLogEntry() {
      const draft = appState.logDraft;
      const impact = calculateLogImpact(draft.category, draft.subtype, draft.quantity);
      const entry = makeEntry(draft.date, draft.category, draft.subtype, draft.quantity, impact.unit, impact.co2kg, sanitizeText(draft.note));
      appState.entries.push(entry);
      appState.streaks.logging = computeLoggingStreak(appState.entries);
      const xp = impact.tone === 'low' ? 44 : impact.tone === 'moderate' ? 34 : 28;
      appState.logSuccess = { entry, xp };
      awardXP(xp, 'logging activity');
      if (appState.entries.length % 25 === 0 || appState.streaks.logging === 7) triggerConfetti();
      scheduleRender();
      window.setTimeout(() => {
        appState.logSuccess = null;
        appState.logDraft = defaultLogDraft();
        navigate('dashboard');
      }, 1400);
    }

    function completeQuickAction(id) {
      const action = QUICK_ACTIONS.find((item) => item.id === id);
      if (!action) return;
      appState.entries.push({
        ...makeEntry(TODAY_KEY, action.category, action.title, 1, 'action', 0, 'Quick eco action'),
        avoidedKg: action.avoidedKg
      });
      const habit = appState.habits.find((item) => item.id === action.habitId);
      if (habit && !habit.completedDates.includes(TODAY_KEY)) habit.completedDates.push(TODAY_KEY);
      appState.streaks.logging = computeLoggingStreak(appState.entries);
      appState.streaks.habits = Math.max(appState.streaks.habits, 1);
      awardXP(action.xp, action.title.toLowerCase());
      updateChallenges(action);
      scheduleRender();
    }

    function completeTask(id) {
      const task = appState.tasks.find((item) => item.id === id);
      if (!task || task.status === 'completed') return;
      task.status = 'completed';
      if (!appState.completedTasks.includes(id)) appState.completedTasks.push(id);
      appState.streaks.tasks += 1;
      awardXP(task.rewardXp, task.title.toLowerCase());
      updateChallenges({ category: task.category, avoidedKg: 0.7 });
      if (computeTaskProgress(appState).percent === 100) triggerConfetti();
      if (!updateTaskSurface(task.id)) scheduleRender();
    }

    function toggleHabit(id) {
      const habit = appState.habits.find((item) => item.id === id);
      if (!habit) return;
      if (habit.completedDates.includes(TODAY_KEY)) {
        habit.completedDates = habit.completedDates.filter((date) => date !== TODAY_KEY);
      } else {
        habit.completedDates.push(TODAY_KEY);
        awardXP(habit.rewardXp, habit.title.toLowerCase());
      }
      Object.assign(habit, computeHabitStats(habit));
      appState.streaks.habits = Math.max(0, ...appState.habits.map((item) => computeHabitStats(item).streakCurrent));
      if (!updateHabitSurface(habit.id)) scheduleRender();
    }

    function startChallenge(title, type, target, reward) {
      if (appState.challenges.some((challenge) => challenge.title === title && challenge.status === 'active')) {
        announce(`${title} is already active.`);
        navigate('challenges');
        return;
      }
      appState.challenges.push({
        id: uid('challenge'),
        title: sanitizeText(title),
        type: sanitizeText(type),
        targetValue: target,
        currentValue: 0,
        startDate: TODAY_KEY,
        endDate: toDateKey(addDays(TODAY, 7)),
        rewardXp: reward,
        status: 'active'
      });
      awardXP(16, 'starting a challenge');
      navigate('challenges');
    }

    function updateChallenges(action) {
      appState.challenges.forEach((challenge) => {
        if (challenge.status !== 'active') return;
        if (challenge.type === 'actions') challenge.currentValue += 1;
        if (challenge.type === 'reduction') challenge.currentValue = round(challenge.currentValue + (action.avoidedKg || 0), 1);
        if (challenge.type === 'transport' && action.category === 'Transport') challenge.currentValue += 1;
        if (challenge.type === 'habit') challenge.currentValue += 1;
        if (challenge.currentValue >= challenge.targetValue) {
          challenge.currentValue = challenge.targetValue;
          challenge.status = 'completed';
          awardXP(challenge.rewardXp, 'completing a challenge');
          triggerConfetti();
        }
      });
    }

    function claimChallenge(id) {
      const challenge = appState.challenges.find((item) => item.id === id);
      if (!challenge) return;
      challenge.status = 'completed';
      awardXP(challenge.rewardXp, 'completing a challenge');
      triggerConfetti();
      scheduleRender();
    }

    function answerQuiz(index) {
      const question = QUIZ_QUESTIONS[appState.quizSession.index];
      appState.quizSession.selected = index;
      appState.quizSession.answers[appState.quizSession.index] = index === question.answer;
      announce(index === question.answer ? 'Correct answer.' : 'Answer recorded with explanation.');
      scheduleRender();
    }

    function nextQuizQuestion() {
      const session = appState.quizSession;
      if (session.index >= QUIZ_QUESTIONS.length - 1) {
        session.finished = true;
        appState.streaks.learning += 1;
        const score = session.answers.filter(Boolean).length;
        appState.quizzes[0] = { ...appState.quizzes[0], completed: true, score };
        awardXP(score >= 8 ? 120 : 80, 'finishing a quiz');
        if (score >= 8) triggerConfetti();
      } else {
        session.index += 1;
        session.selected = null;
      }
      scheduleRender();
    }

    function completeTip(id) {
      if (!appState.completedTips.includes(id)) {
        appState.completedTips.push(id);
        awardXP(18, 'finishing a recommendation');
        if (!updateTipFilterSurface(appState.tipsFilter)) scheduleRender();
      }
    }

    function openDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      const backdrop = document.getElementById('drawer-backdrop');
      const toggle = document.getElementById('menu-toggle');
      drawer?.classList.add('is-open');
      backdrop?.classList.add('is-open');

      drawer?.setAttribute('aria-hidden', 'false');

      drawer?.classList.remove('is-open');

    function showTooltip(event) {
      const target = event.target.closest('[data-tip]');
      const tooltip = document.getElementById('tooltip');
      if (!target || !tooltip) return;
      tooltip.textContent = target.dataset.tip;
      tooltip.hidden = false;
      const rect = target.getBoundingClientRect();
      const left = clamp(rect.left + rect.width / 2 - 130, 12, window.innerWidth - 332);
      const top = clamp(rect.top - 56, 12, window.innerHeight - 90);
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function hideTooltip(event) {
      if (!event.target.closest('[data-tip]')) return;
      const tooltip = document.getElementById('tooltip');
      if (tooltip) tooltip.hidden = true;
    }

    function animateCounters() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      document.querySelectorAll('[data-counter]').forEach((node) => {
        const target = Number(node.dataset.counter);
        if (!Number.isFinite(target)) return;
        const start = 0;
        const duration = 760;
        const begin = performance.now();
        function tick(now) {
          const progress = clamp((now - begin) / duration, 0, 1);
          const value = start + (target - start) * (1 - Math.pow(1 - progress, 3));
          node.textContent = target % 1 === 0 ? String(Math.round(value)) : round(value, 1);
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      });
    }

    function triggerConfetti() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const canvas = document.getElementById('confetti');
      if (!canvas) return;
      const context = canvas.getContext('2d');
      const width = canvas.width = window.innerWidth;
      const height = canvas.height = window.innerHeight;
      const colors = ['var(--accent)', 'var(--success)', 'var(--chart-gold)', 'var(--chart-orange)', 'var(--chart-blue)'];
      const resolved = colors.map((color) => {
        const probe = document.createElement('span');
        probe.style.color = color;
        document.body.appendChild(probe);
        const value = getComputedStyle(probe).color;
        probe.remove();
        return value;
      });
      const pieces = Array.from({ length: 70 }, (_, index) => ({
        x: width * 0.5 + (index % 12 - 6) * 12,
        y: height * 0.24,
        vx: (Math.random() - 0.5) * 7,
        vy: Math.random() * -6 - 2,
        size: 5 + Math.random() * 6,
        color: resolved[index % resolved.length],
        life: 0
      }));
      function frame() {
        context.clearRect(0, 0, width, height);
        pieces.forEach((piece) => {
          piece.life += 1;
          piece.x += piece.vx;
          piece.y += piece.vy;
          piece.vy += 0.16;
          context.save();
          context.translate(piece.x, piece.y);
          context.rotate(piece.life / 8);
          context.fillStyle = piece.color;
          context.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size);
          context.restore();
        });
        if (pieces.some((piece) => piece.y < height + 20 && piece.life < 160)) requestAnimationFrame(frame);
        else context.clearRect(0, 0, width, height);
      }
      frame();
    }
